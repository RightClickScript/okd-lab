---
- name: Phase 1-2 - Deploy Infrastructure Core (MetalLB & Traefik)
  hosts: localhost
  gather_facts: false

  vars:
    kubeconfig_path: "{{ playbook_dir }}/../../.lpt1_kubeconfig"
    metallb_version: "v0.14.9"
    vip_address: "192.168.199.50"
    domain: "homelab.local"
    lpt1_ip: "192.168.199.5"

  tasks:
    - name: 📁 NAMESPACE - Create Core Namespaces
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        name: "{{ item }}"
        api_version: v1
        kind: Namespace
        state: present
      loop: [metallb-system, semaphore]

    - name: 🚀 METALLB - Apply Proven Manifests
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "https://raw.githubusercontent.com/metallb/metallb/{{ metallb_version }}/config/manifests/metallb-native.yaml"

    - name: ⏳ METALLB - Wait for Controller
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        kind: Pod
        namespace: metallb-system
        label_selectors: [component=controller]
      register: ctrl
      until: "ctrl.resources | length > 0 and ctrl.resources[0].status.phase == 'Running'"
      retries: 20
      delay: 5

    - name: 📝 METALLB - Configure Pool and L2 Adv
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          - apiVersion: metallb.io/v1beta1
            kind: IPAddressPool
            metadata: { name: main-pool, namespace: metallb-system }
            spec: { addresses: ["{{ vip_address }}-{{ vip_address | regex_replace('\\.50$', '.60') }}"] }
          - apiVersion: metallb.io/v1beta1
            kind: L2Advertisement
            metadata: { name: default, namespace: metallb-system }
            spec: { ipAddressPools: [main-pool] }

    - name: 🚀 TRAEFIK - Deploy Ingress Controller
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_path }}"
        name: traefik
        chart_ref: traefik/traefik
        release_namespace: kube-system
        values:
          service:
            type: LoadBalancer
            spec: { loadBalancerIP: "{{ vip_address }}" }
        wait: true

    - name: 🌐 INGRESS - Create Global Access Rules
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          - apiVersion: v1
            kind: Service
            metadata: { name: dist-hub-external, namespace: default }
            spec:
              ports: [{ protocol: TCP, port: 8080, targetPort: 8080 }]
          - apiVersion: v1
            kind: Endpoints
            metadata: { name: dist-hub-external, namespace: default }
            subsets:
              - addresses: [{ ip: "{{ lpt1_ip }}" }]
                ports: [{ port: 8080 }]
          - apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: factory-ingress
              namespace: "{{ item.ns }}"
              annotations: { traefik.ingress.kubernetes.io/router.entrypoints: web }
            spec:
              rules:
                - host: "{{ item.host }}.{{ domain }}"
                  http:
                    paths:
                      - path: /
                        pathType: Prefix
                        backend:
                          service: { name: "{{ item.svc }}", port: { number: "{{ item.port }}" } }
      loop:
        - { host: "semaphore", ns: "semaphore", svc: "semaphore", port: 3000 }
        - { host: "dist", ns: "default", svc: "dist-hub-external", port: 8080 }
