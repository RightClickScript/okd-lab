---
- name: Phase 0.1 - Artifact Initialization & Sync to Hub
  hosts: localhost
  gather_facts: false
  
  tasks:
    - name: 📁 DIRECTORY - Ensure local artifact folders exist
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../../playbooks/artifacts/{{ item }}"
        state: directory
        mode: '0755'
      loop: [iso, bin, secrets]

    - name: 🔐 CHECK - Verify RHEL Pull Secret
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../RHEL_pull_secret.json"
      register: pull_secret_stat

    - name: 🛑 ALERT - Instructions for Pull Secret
      ansible.builtin.fail:
        msg: "RHEL_pull_secret.json is missing in the root!"
      when: not pull_secret_stat.stat.exists

    - name: 📦 SYNC - Push ALL Artifacts to Distribution Hub (lpt-1)
      ansible.builtin.command:
        cmd: "rsync -avz --progress {{ playbook_dir }}/../../playbooks/artifacts/ lpt-1:{{ lab_init.distribution_root }}/"
      changed_when: true
      delegate_to: localhost

    - name: 🔓 STATUS - Artifacts Synced
      ansible.builtin.debug:
        msg: "All ISOs, binaries, and secrets have been synchronized to the lpt-1 distribution hub."
