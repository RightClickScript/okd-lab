---
- name: Phase 4.4 - Deploy OpenShift Virtualization & Storage
  hosts: local_spark
  become: true
  gather_facts: false

  vars:
    kubeconfig: "/opt/okd-cluster/auth/kubeconfig"
    virt_namespace: "kubevirt-hyperconverged"
    nmstate_version: "v0.86.0"

  tasks:
    # -------------------------------------------------------------------------
    # 1. KUBE-VIRT OPERATOR
    # -------------------------------------------------------------------------
    - name: 🔍 CHECK - Is KubeVirt Operator Installed?
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        oc get csv -n {{ virt_namespace }} | grep -i "kubevirt-hyperconverged" | grep -i "Succeeded"
      register: kubevirt_installed
      ignore_errors: true
      changed_when: false

    - name: 📦 DEPLOY - KubeVirt Operator & Subscription
      when: kubevirt_installed.rc != 0
      block:
        - name: Apply Namespace, OperatorGroup, and Subscription
          ansible.builtin.shell: |
            export KUBECONFIG={{ kubeconfig }}
            cat <<EOF | oc apply -f -
            apiVersion: v1
            kind: Namespace
            metadata:
              name: {{ virt_namespace }}
            ---
            apiVersion: operators.coreos.com/v1
            kind: OperatorGroup
            metadata:
              name: kubevirt-hyperconverged-group
              namespace: {{ virt_namespace }}
            ---
            apiVersion: operators.coreos.com/v1alpha1
            kind: Subscription
            metadata:
              name: community-kubevirt-hyperconverged
              namespace: {{ virt_namespace }}
            spec:
              channel: stable
              installPlanApproval: Automatic
              name: community-kubevirt-hyperconverged
              source: community-operators
              sourceNamespace: openshift-marketplace
              startingCSV: kubevirt-hyperconverged-operator.v1.15.2
            EOF
          changed_when: true

        - name: ⏳ WAIT - Verify Operator Installation (Succeeded)
          ansible.builtin.shell: |
            export KUBECONFIG={{ kubeconfig }}
            oc get csv -n {{ virt_namespace }} | grep -i "kubevirt-hyperconverged" | grep -i "Succeeded"
          register: csv_check
          until: csv_check.rc == 0
          retries: 30
          delay: 20
          changed_when: false

    # -------------------------------------------------------------------------
    # 2. STORAGE (SELINUX & HOSTPATH PROVISIONER)
    # -------------------------------------------------------------------------
    - name: 🔍 DISCOVER - Get OKD Worker Nodes
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        oc get nodes -l node-role.kubernetes.io/worker -o jsonpath='{.items[*].metadata.name}'
      register: worker_nodes
      changed_when: false

    - name: 🛡️ STORAGE - Prepare Worker Node Storage (SELinux)
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        # Idempotent check: only run chcon if container_file_t is missing
        oc debug node/{{ item }} -- chroot /host /bin/bash -c "mkdir -p /var/hpvolumes && if ! ls -dZ /var/hpvolumes 2>/dev/null | grep -q container_file_t; then chcon -R -t container_file_t /var/hpvolumes; echo 'changed'; fi"
      loop: "{{ worker_nodes.stdout.split() }}"
      register: selinux_fix
      changed_when: "'changed' in selinux_fix.stdout"

    - name: 💾 STORAGE - Deploy HostPath Provisioner & StorageClass
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        cat <<EOF | oc apply -f -
        apiVersion: hostpathprovisioner.kubevirt.io/v1beta1
        kind: HostPathProvisioner
        metadata:
          name: hostpath-provisioner
        spec:
          imagePullPolicy: IfNotPresent
          pathConfig:
            path: "/var/hpvolumes"
            useNamingPrefix: false
          workload:
            nodeSelector:
              node-role.kubernetes.io/worker: ""
        ---
        apiVersion: storage.k8s.io/v1
        kind: StorageClass
        metadata:
          name: hostpath-virt
          annotations:
            storageclass.kubernetes.io/is-default-class: "true"
        provisioner: kubevirt.io.hostpath-provisioner
        reclaimPolicy: Delete
        volumeBindingMode: WaitForFirstConsumer
        EOF
      register: storage_apply
      changed_when: "'created' in storage_apply.stdout or 'configured' in storage_apply.stdout"

    # -------------------------------------------------------------------------
    # 3. NETWORKING (NMSTATE OPERATOR)
    # -------------------------------------------------------------------------
    - name: 🔍 CHECK - Is NMState Operator Installed?
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        oc get nmstate nmstate
      register: nmstate_installed
      ignore_errors: true
      changed_when: false

    - name: 🌐 NETWORKING - Install NMState Operator
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        BASE_URL="https://github.com/nmstate/kubernetes-nmstate/releases/download/{{ nmstate_version }}"
        oc apply -f $BASE_URL/nmstate.io_nmstates.yaml
        oc apply -f $BASE_URL/namespace.yaml
        oc apply -f $BASE_URL/service_account.yaml
        oc apply -f $BASE_URL/role.yaml
        oc apply -f $BASE_URL/role_binding.yaml
        oc apply -f $BASE_URL/operator.yaml
        
        cat <<EOF | oc apply -f -
        apiVersion: nmstate.io/v1
        kind: NMState
        metadata:
          name: nmstate
        EOF
      when: nmstate_installed.rc != 0
      changed_when: true

    - name: ⏳ WAIT - Verify NMState Operator is Ready
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        # We want to make sure at least one handler is running
        oc get pods -n nmstate | grep nmstate-handler | grep -i Running
      register: nmstate_ready
      until: nmstate_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: 🌐 NETWORKING - Create External Bridge (br-ext) via enp2s0
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        cat <<EOF | oc apply -f -
        apiVersion: nmstate.io/v1
        kind: NodeNetworkConfigurationPolicy
        metadata:
          name: br-ext-all-nodes
        spec:
          desiredState:
            interfaces:
              - name: br-ext
                type: linux-bridge
                state: up
                ipv4:
                  enabled: false
                ipv6:
                  enabled: false
                bridge:
                  options:
                    stp:
                      enabled: false
                  port:
                    - name: enp2s0
        EOF
      register: nncp_apply
      changed_when: "'created' in nncp_apply.stdout or 'configured' in nncp_apply.stdout"

    - name: 🔌 NETWORKING - Create NetworkAttachmentDefinition (NAD)
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        cat <<EOF | oc apply -f -
        apiVersion: "k8s.cni.cncf.io/v1"
        kind: NetworkAttachmentDefinition
        metadata:
          name: bridge-conf
          namespace: default
        spec:
          config: '{
              "cniVersion": "0.3.1",
              "name": "bridge-conf",
              "type": "bridge",
              "bridge": "br-ext",
              "ipam": {}
            }'
        EOF
      register: nad_apply
      changed_when: "'created' in nad_apply.stdout or 'configured' in nad_apply.stdout"

    - name: 🚀 VIRTUALIZATION - Deploy HyperConverged Control Plane
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        cat <<EOF | oc apply -f -
        apiVersion: hco.kubevirt.io/v1beta1
        kind: HyperConverged
        metadata:
          name: kubevirt-hyperconverged
          namespace: {{ virt_namespace }}
        spec:
          enableCommonBootImageImport: true
          workloadUpdateStrategy:
            workloadUpdateMethods:
              - LiveMigrate
          uninstallStrategy: BlockUninstallIfWorkloadsExist
        EOF
      register: hco_apply
      changed_when: "'created' in hco_apply.stdout or 'configured' in hco_apply.stdout"

    - name: 🔓 STATUS - Virtualization Fully Automated
      ansible.builtin.debug:
        msg: "Phase 4.4 Finished: KubeVirt, Storage, and Virtual Networking are fully deployed and configured."
