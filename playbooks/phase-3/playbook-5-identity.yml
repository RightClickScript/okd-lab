---
- name: Phase 3-1 - Deploy MS AD/DNS (Identity)
  hosts: management_plane
  become: true
  gather_facts: false

  vars:
    # ISO Details
    iso_url: "https://go.microsoft.com/fwlink/p/?LinkID=2195167&clcid=0x409&culture=en-us&country=US"
    # Local paths on Laptop
    local_unattended_xml: "/tmp/autounattend.xml"
    local_unattended_iso: "/tmp/unattended.iso"
    # Remote paths on AMD Epyc
    iso_root: "/var/lib/libvirt/images"
    win_iso: "{{ iso_root }}/WinServer2022.iso"
    virtio_iso: "{{ iso_root }}/virtio-win.iso"
    unattended_iso: "{{ iso_root }}/unattended.iso"
    vm_name: "identity-01"

  tasks:
    - name: 📦 PREREQ - Download Windows Server ISO (Idempotent)
      ansible.builtin.get_url:
        url: "{{ iso_url }}"
        dest: "{{ win_iso }}"
        mode: "0644"
        force: false
        timeout: 1800 # 30 minute timeout for 5GB+ file

    - name: 📦 PREREQ - Download VirtIO Drivers (Idempotent)
      ansible.builtin.get_url:
        url: "https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/latest-virtio/virtio-win.iso"
        dest: "{{ virtio_iso }}"
        mode: "0644"
        force: false

    - name: 📄 TEMPLATE - Render Autounattend XML
      ansible.builtin.template:
        src: "../../templates/windows/autounattend.xml.j2"
        dest: "{{ local_unattended_xml }}"
      delegate_to: localhost
      become: false

    - name: 🗑️ CLEANUP - Remove old Unattended ISO
      ansible.builtin.file:
        path: "{{ local_unattended_iso }}"
        state: absent
      delegate_to: localhost
      become: false

    - name: � ISO - Create Unattended ISO (on Laptop)
      ansible.builtin.shell: |
        genisoimage -output {{ local_unattended_iso }} -volid "unattended" -joliet -rock {{ local_unattended_xml }}
      delegate_to: localhost
      become: false

    - name: 📤 UPLOAD - Transfer Unattended ISO to AMD Epyc
      ansible.builtin.copy:
        src: "{{ local_unattended_iso }}"
        dest: "{{ unattended_iso }}"
        mode: "0644"
        force: true

    - name: 🔍 CHECK - Verify Windows ISO exists
      ansible.builtin.stat:
        path: "{{ win_iso }}"
      register: win_iso_stat

    - name: 🛑 FAIL - If Windows ISO is missing
      ansible.builtin.fail:
        msg: "The Windows ISO is missing at {{ win_iso }}. Please download it first!"
      when: not win_iso_stat.stat.exists

    - name: 💿 DISK - Create QCOW2 Disk
      ansible.builtin.shell: |
        qemu-img create -f qcow2 {{ iso_root }}/{{ vm_name }}.qcow2 {{ dcdetails.BootDiskSize }}G
      args:
        creates: "{{ iso_root }}/{{ vm_name }}.qcow2"

    - name: 🏗️ VM - Define and Start Identity VM
      ansible.builtin.shell: |
        virt-install \
          --name {{ vm_name }} \
          --ram {{ dcdetails.Memory }} \
          --vcpus {{ dcdetails.CPU }} \
          --os-variant win2k22 \
          --disk path={{ iso_root }}/{{ vm_name }}.qcow2,bus=virtio \
          --cdrom {{ win_iso }} \
          --disk path={{ virtio_iso }},device=cdrom,bus=sata,readonly=on \
          --disk path={{ unattended_iso }},device=cdrom,bus=sata,readonly=on \
          --network bridge=br0,model=virtio \
          --graphics vnc,listen=0.0.0.0 \
          --noautoconsole \
          --boot cdrom,hd
      args:
        creates: "/etc/libvirt/qemu/{{ vm_name }}.xml"

    - name: 🔓 STATUS - Deployment Started
      ansible.builtin.debug:
        msg: "Identity VM '{{ vm_name }}' is installing. It will be reachable at {{ dcdetails.IPAddress }} via WinRM shortly."
