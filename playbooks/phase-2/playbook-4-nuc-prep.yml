---
- name: Phase 2.3 - NUC Ignition Generation (Manual Install Support)
  hosts: local_spark
  become: true
  gather_facts: false

  vars:
    distribution_root: "/mnt/data/distribution"
    # SCOS usually expects Ignition 3.4.0
    ign_version: "3.4.0"

  tasks:
    - name: 📂 FOLDER - Ensure Ignition directory exists on Hub
      ansible.builtin.file:
        path: "{{ distribution_root }}/ign"
        state: directory
        mode: '0755'
        owner: 1001
        group: 1001

    - name: 📄 IGNITION - Generate JSON for each NUC
      ansible.builtin.copy:
        dest: "{{ distribution_root }}/ign/{{ item }}.json"
        content: |
          {
            "ignition": { "version": "{{ ign_version }}" },
            "passwd": {
              "users": [
                {
                  "name": "bishop",
                  "passwordHash": "$6$2.AkBiINvK6sG1Xc$4IpxnmmRZ0HhXgtndXgOIs7YYQ7cXdV.ub3Lmus3OBDJYqMi5HHzw/bGSlDUmGIFfTVjVB4.vIrNeeQPUrnKW1",
                  "sshAuthorizedKeys": [
                    "{{ ansible_ssh_public_key }}"
                  ],
                  "groups": ["sudo", "wheel"]
                }
              ]
            },
            "storage": {
              "files": [
                {
                  "path": "/etc/hostname",
                  "mode": 420,
                  "contents": { "source": "data:,{{ item | replace('_', '-') }}" }
                }
              ]
            }
          }
      loop: "{{ groups['compute_plane'] }}"

    - name: 🔓 STATUS - Ignition URLs Ready
      ansible.builtin.debug:
        msg:
          - "SCOS Ignition files are ready for manual installation:"
          - "NUC-1: http://192.168.199.5:8080/ign/nuc-1.json"
          - "NUC-2: http://192.168.199.5:8080/ign/nuc-2.json"
          - "NUC-3: http://192.168.199.5:8080/ign/nuc-3.json"
          - "Install Command example: coreos-installer install /dev/nvme0n1 --ignition-url http://192.168.199.5:8080/ign/nuc-1.json"
