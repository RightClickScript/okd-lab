---
- name: Phase 0.5 - OKD Graceful Cluster Shutdown
  hosts: local_spark
  become: true
  gather_facts: false

  vars:
    install_dir: "/opt/okd-cluster"
    kubeconfig: "/opt/okd-cluster/auth/kubeconfig"

  tasks:
    - name: 🛑 NESTED VMS - Stop all KubeVirt VMs
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        # Iterate over all virtual machines in all namespaces and set running to false
        for vm in $(oc get virtualmachine -A -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}'); do
          namespace=$(echo $vm | awk '{print $1}')
          name=$(echo $vm | awk '{print $2}')
          echo "Stopping VM $name in namespace $namespace"
          oc patch virtualmachine $name -n $namespace --type merge -p '{"spec":{"running":false}}' || true
        done
      changed_when: true
      ignore_errors: true

    - name: 🔐 BACKUP - Take ETCD Snapshot (Pre-Shutdown Safety)
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        oc debug node/okd-master-01.homelab.local -- chroot /host /usr/local/bin/cluster-backup.sh /home/core/assets/backup
      ignore_errors: true

- name: Phase 0.5b - Hypervisor-Led VM Shutdown
  hosts: hypervisors
  become: true
  gather_facts: false
  tasks:
    - name: 💤 OKD VMS - Signal ACPI Shutdown to all OKD VMs
      ansible.builtin.shell: |
        for vm in $(virsh list --name | grep 'okd-'); do
          echo "Signaling ACPI shutdown to $vm..."
          virsh shutdown "$vm" || true
        done
      changed_when: true

    - name: 💤 CORE VMS - Signal ACPI Shutdown to AD and Morpheus
      ansible.builtin.shell: |
        virsh shutdown identity-01 || true
        virsh shutdown morpheus-01 || true
      when: inventory_hostname == 'sms-1'
      changed_when: true

    - name: ⏳ WAIT - Wait for all VMs to power off (Graceful period)
      ansible.builtin.shell: |
        for i in {1..30}; do
          running=$(virsh list --name | grep -E '^okd-|^identity-01$|^morpheus-01$' | wc -l)
          if [ "$running" -eq 0 ]; then
            echo "All VMs powered off."
            exit 0
          fi
          echo "Waiting for $running VMs to stop..."
          sleep 10
        done
        exit 1
      register: vm_wait
      ignore_errors: true
      changed_when: false

    - name: 🗡️ FORCE - Kill any lingering VMs (If graceful failed)
      ansible.builtin.shell: |
        for vm in $(virsh list --name | grep -E 'okd-|identity-01|morpheus-01'); do
          echo "Graceful shutdown failed. Force-killing $vm..."
          virsh destroy "$vm" || true
        done
      when: vm_wait.rc != 0
      changed_when: true

- name: Phase 0.5c - Physical Host Shutdown
  hosts: physical
  become: true
  gather_facts: false
  tasks:
    - name: 🛑 POWER OFF - Shut down NUCs and SMS-1
      community.general.shutdown:
      when: type in ['nuc', 'sms']
