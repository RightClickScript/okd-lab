---
- name: Phase 3-2a - Deploy Morpheus Appliance VM (ISO + cidata)
  hosts: management_plane
  become: true
  gather_facts: false

  vars:
    # ISO Details - Ubuntu 22.04.5 Live Server
    iso_url: "https://releases.ubuntu.com/22.04/ubuntu-22.04.5-live-server-amd64.iso"
    iso_root: "/var/lib/libvirt/images"
    ubuntu_iso: "{{ iso_root }}/ubuntu-22.04.5-live-server-amd64.iso"
    vm_name: "{{ morpheusdetails.name }}"
    vm_disk: "{{ iso_root }}/{{ vm_name }}.qcow2"
    cloud_init_iso: "{{ iso_root }}/{{ vm_name }}-cloud-init.iso"

  tasks:
    - name: 📦 PREREQ - Download Ubuntu Server ISO
      ansible.builtin.get_url:
        url: "{{ iso_url }}"
        dest: "{{ ubuntu_iso }}"
        mode: "0644"
        force: false

    - name: 📄 AUTOINSTALL - Generate user-data (On AMD Epyc)
      ansible.builtin.copy:
        dest: "/tmp/{{ vm_name }}-user-data"
        content: |
          #cloud-config
          autoinstall:
            version: 1
            locale: en_US.UTF-8
            keyboard:
              layout: us
            network:
              version: 2
              ethernets:
                eth0:
                  dhcp4: no
                  addresses:
                    - {{ morpheusdetails.IPAddress }}/24
                  gateway4: 192.168.199.254
                  nameservers:
                    addresses: [192.168.199.10, 8.8.8.8]
                  search: [{{ ad.domain_FQDN }}]
            identity:
              hostname: {{ vm_name }}
              username: bishop
              password: "{{ ansible_password | password_hash('sha512') }}"
            ssh:
              install-server: true
              allow-pw: true
              authorized-keys:
                - "{{ ansible_ssh_public_key }}"
            storage:
              layout:
                name: direct
            late-commands:
              - echo 'bishop ALL=(ALL) NOPASSWD:ALL' > /target/etc/sudoers.d/bishop
              - curtin in-target --target=/target -- chmod 440 /etc/sudoers.d/bishop
      delegate_to: localhost
      become: false

    - name: 📄 AUTOINSTALL - Generate empty meta-data
      ansible.builtin.copy:
        dest: "/tmp/{{ vm_name }}-meta-data"
        content: ""
      delegate_to: localhost
      become: false

    - name: 💿 CLOUD-INIT - Create cidata ISO (On Laptop)
      ansible.builtin.shell: |
        genisoimage -output /tmp/{{ vm_name }}-cloud-init.iso \
          -volid CIDATA -joliet -rock -graft-points \
          user-data=/tmp/{{ vm_name }}-user-data \
          meta-data=/tmp/{{ vm_name }}-meta-data
      delegate_to: localhost
      become: false

    - name: 📤 UPLOAD - Cloud-Init ISO to AMD Epyc
      ansible.builtin.copy:
        src: "/tmp/{{ vm_name }}-cloud-init.iso"
        dest: "{{ cloud_init_iso }}"
        mode: "0644"

    - name: 💿 DISK - Create QCOW2 Disk
      ansible.builtin.shell: |
        qemu-img create -f qcow2 {{ vm_disk }} {{ morpheusdetails.BootDiskSize }}G
      args:
        creates: "{{ vm_disk }}"

    - name: 🏗️ VM - Define and Start Morpheus VM (ISO + cidata)
      ansible.builtin.shell: |
        virt-install \
          --name {{ vm_name }} \
          --ram {{ morpheusdetails.Memory }} \
          --vcpus {{ morpheusdetails.CPU }} \
          --os-variant ubuntu22.04 \
          --location {{ ubuntu_iso }},kernel=casper/vmlinuz,initrd=casper/initrd \
          --disk path={{ vm_disk }},format=qcow2,bus=virtio \
          --disk path={{ cloud_init_iso }},device=cdrom,bus=sata \
          --network type=direct,source=bond0,source_mode=bridge,model=virtio \
          --graphics vnc,listen=0.0.0.0 \
          --noautoconsole \
          --extra-args "autoinstall ds=nocloud;seedfrom=/cidata/"
      args:
        creates: "/etc/libvirt/qemu/{{ vm_name }}.xml"

- name: Phase 3-2b - Install Morpheus Appliance
  hosts: morpheus
  become: true
  gather_facts: false

  tasks:
    - name: ⏳ WAIT - Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        timeout: 1200

    - name: 📤 UPLOAD - Transfer Morpheus Binary
      ansible.builtin.copy:
        src: "{{ morpheusdetails.binary_local_path }}"
        dest: "{{ morpheusdetails.binary_remote_path }}"
        mode: "0644"

    - name: 🏗️ INSTALL - Install Morpheus Package
      ansible.builtin.apt:
        deb: "{{ morpheusdetails.binary_remote_path }}"
        state: present

    - name: ⚙️ CONFIG - Reconfigure Morpheus (Initial)
      ansible.builtin.command: morpheus-ctl reconfigure
      register: reconfigure_output
      changed_when: "'reconfigure: success' in reconfigure_output.stdout"

    - name: 🔓 STATUS - Morpheus is Ready
      ansible.builtin.debug:
        msg: "Morpheus Appliance is installed and reconfigured. Access it at https://{{ morpheusdetails.IPAddress }}"
