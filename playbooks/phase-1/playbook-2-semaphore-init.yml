---
- name: Phase 1-2 - Deploy Semaphore UI
  hosts: local_spark
  become: true
  gather_facts: false

  vars:
    # We will use the original data we migrated to /opt/semaphore
    semaphore_root: "/opt/semaphore"
    semaphore_image: "semaphoreui/semaphore:latest" # Adjust version if needed based on original
    default_password: "{{ default_password }}" # Use a secure password in production
    postgres_image: "postgres" # Adjust version if needed based on original
    mgmt_ip: "192.168.199.5"

  tasks:
    - name: 🚀 DEPLOY - Semaphore & Postgres Containers
      community.docker.docker_compose_v2:
        project_name: bishop_semaphore
        state: present
        definition:
          services:
            semaphore_db:
              image: "{{ postgres_image }}"
              restart: always
              environment:
                POSTGRES_USER: semaphore
                POSTGRES_PASSWORD: "{{ default_password }}"
                POSTGRES_DB: semaphore
              volumes:
                - "{{ semaphore_root }}/postgres:/var/lib/postgresql/data"
              networks:
                - semaphore_net

            semaphore:
              image: "{{ semaphore_image }}"
              restart: always
              ports:
                - "3000:3000"
              environment:
                SEMAPHORE_DB_USER: semaphore
                SEMAPHORE_DB_PASS: "{{ default_password }}"
                SEMAPHORE_DB_HOST: semaphore_db
                SEMAPHORE_DB_PORT: 5432
                SEMAPHORE_DB_DIALECT: postgres
                SEMAPHORE_DB: semaphore
              volumes:
                - "{{ semaphore_root }}/config:/etc/semaphore"
                - "{{ semaphore_root }}/data:/var/lib/semaphore"
              depends_on:
                - semaphore_db
              networks:
                - semaphore_net

          networks:
            semaphore_net:
              driver: bridge

    - name: 🔗 ACCESS - Output URL
      ansible.builtin.debug:
        msg: "Semaphore is now active at http://{{ mgmt_ip }}:3000"
