---
- name: Phase 4.1 - Generate and Patch OKD Ignition (lpt-1)
  hosts: local_spark
  become: true
  gather_facts: false

  vars:
    install_dir: "/opt/okd-cluster"
    distribution_root: "/mnt/data/distribution"

  tasks:
    - name: 🔐 SECRET - Load Pull Secret from Hub
      ansible.builtin.shell: "cat {{ distribution_root }}/secrets/pull_secret.json"
      register: pull_secret_content
      changed_when: false

    - name: 📌 SET - Define Pull Secret Fact
      ansible.builtin.set_fact:
        pull_secret: "{{ pull_secret_content.stdout | from_json | to_json }}"

    - name: 📁 PREP - Create Install Directory
      ansible.builtin.file:
        path: "{{ install_dir }}"
        state: directory
        mode: '0755'

    - name: 📦 TOOLS - Ensure exact OKD 4.19 Binaries exist on lpt-1
      ansible.builtin.shell: |
        if ! openshift-install version | grep -q "4.19"; then
          curl -L {{ artifacts.okd_install_url }} | tar -xz -C /usr/local/bin
          curl -L {{ artifacts.okd_client_url }} | tar -xz -C /usr/local/bin
        fi
      changed_when: true

    - name: 📄 CONFIG - Generate install-config.yaml
      ansible.builtin.template:
        src: "../../templates/okd/install-config.yaml.j2"
        dest: "{{ install_dir }}/install-config.yaml"
        mode: "0644"

    - name: 🔥 IGNITION - Generate Cluster Ignition Files
      ansible.builtin.command:
        cmd: "openshift-install create ignition-configs --dir={{ install_dir }}"
      args:
        creates: "{{ install_dir }}/bootstrap.ign"

    - name: 🛠️ PATCH - Inject Static IPs and Password into Ignition
      ansible.builtin.shell: |
        cat <<EOF > /tmp/patch_ignition.py
        import json, base64, sys
        
        name = sys.argv[1]
        ip = sys.argv[2]
        role = sys.argv[3]
        file_path = f"{{ install_dir }}/{role}.ign"
        
        with open(file_path, 'r') as f:
            data = json.load(f)
        
        if "passwd" not in data: data["passwd"] = {}
        if "users" not in data["passwd"]: data["passwd"]["users"] = []
        
        core_user = next((u for u in data["passwd"]["users"] if u["name"] == "core"), None)
        pass_hash = "\$6\$2.AkBiINvK6sG1Xc\$4IpxnmmRZ0HhXgtndXgOIs7YYQ7cXdV.ub3Lmus3OBDJYqMi5HHzw/bGSlDUmGIFfTVjVB4.vIrNeeQPUrnKW1"
        
        if core_user:
            core_user["passwordHash"] = pass_hash
        else:
            data["passwd"]["users"].append({"name": "core", "passwordHash": pass_hash})

        nm_config = f"""[connection]
        id=enp1s0
        type=ethernet
        interface-name=enp1s0
        
        [ipv4]
        address1={ip}/24,{{ network.mgmt_gateway }}
        dns=192.168.199.10;
        dns-search={{ network.search_domains[0] }};
        method=manual
        """
        
        new_file = {
            "path": "/etc/NetworkManager/system-connections/enp1s0.nmconnection",
            "mode": 384,
            "contents": {
                "source": "data:text/plain;charset=utf-8;base64," + base64.b64encode(nm_config.encode()).decode()
            }
        }
        
        if "storage" not in data: data["storage"] = {}
        if "files" not in data["storage"]: data["storage"]["files"] = []
        data["storage"]["files"].append(new_file)
        
        with open(f"{{ install_dir }}/{name}.ign", 'w') as f:
            json.dump(data, f)
        EOF
        
        python3 /tmp/patch_ignition.py okd-bootstrap 192.168.199.20 bootstrap
        python3 /tmp/patch_ignition.py okd-master-01 192.168.199.21 master
        python3 /tmp/patch_ignition.py okd-master-02 192.168.199.22 master
        python3 /tmp/patch_ignition.py okd-master-03 192.168.199.23 master
      changed_when: true

    - name: 📤 PUBLISH - Move Patched Ignition to Distro Hub
      ansible.builtin.copy:
        src: "{{ install_dir }}/{{ item }}.ign"
        dest: "{{ distribution_root }}/ign/{{ item }}.ign"
        remote_src: true
        mode: "0644"
        owner: 1001
        group: 1001
      loop: [okd-bootstrap, okd-master-01, okd-master-02, okd-master-03, worker]

- name: Phase 4.2 - Provision OKD Master VMs on SMS-1 (Selective Deployment)
  hosts: management_plane
  become: true
  gather_facts: false

  vars:
    vm_root: "/mnt/data/vms"
    base_image: "{{ vm_root }}/scos-base.qcow2"
    # Default to False (full deploy)
    bootstrap_only: false
    
    vm_list:
      - { name: "okd-bootstrap", ram: 32768, cpu: 4, disk: 100 }
      - { name: "okd-master-01", ram: 16384, cpu: 4, disk: 100 }
      - { name: "okd-master-02", ram: 16384, cpu: 4, disk: 100 }
      - { name: "okd-master-03", ram: 16384, cpu: 4, disk: 100 }

  tasks:
    - name: 💿 BASE - Download SCOS QCOW2 Image to SMS-1
      ansible.builtin.get_url:
        url: "{{ artifacts.scos_qcow2_url }}"
        dest: "{{ base_image }}.gz"
        mode: "0644"
        force: false

    - name: 📦 EXTRACT - Decompress Base Image
      ansible.builtin.shell: |
        gunzip -c {{ base_image }}.gz > {{ base_image }}
      args:
        creates: "{{ base_image }}"

    - name: 🏗️ VM - Create Clones and Start Selected VMs
      ansible.builtin.shell: |
        # 1. Cleanup old VM
        virsh destroy {{ item.name }} || true
        virsh undefine {{ item.name }} --remove-all-storage || true
        
        # 2. Create Clone from Base Image
        qemu-img create -f qcow2 -F qcow2 -b {{ base_image }} {{ vm_root }}/{{ item.name }}.qcow2 {{ item.disk }}G
        
        # 3. Download the specific Ignition file
        curl -o {{ vm_root }}/{{ item.name }}.ign http://192.168.199.5:8080/ign/{{ item.name }}.ign
        
        # 4. Launch VM with fw_cfg
        virt-install \
          --name {{ item.name }} \
          --ram {{ item.ram }} \
          --vcpus {{ item.cpu }} \
          --os-variant fedora-coreos-stable \
          --disk path={{ vm_root }}/{{ item.name }}.qcow2,bus=virtio \
          --import \
          --network bridge=br0,model=virtio \
          --graphics vnc,listen=0.0.0.0 \
          --noautoconsole \
          --wait 0 \
          --events on_poweroff=restart,on_reboot=restart,on_crash=restart \
          --qemu-commandline="-fw_cfg name=opt/com.coreos/config,file={{ vm_root }}/{{ item.name }}.ign"
      args:
        creates: "/etc/libvirt/qemu/{{ item.name }}.xml"
      loop: "{{ vm_list if not bootstrap_only else [vm_list[0]] }}"

    - name: ⚡ AUTOSTART - Enable Selected VM Persistence
      ansible.builtin.shell: "virsh autostart {{ item.name }}"
      loop: "{{ vm_list if not bootstrap_only else [vm_list[0]] }}"

    - name: ⚡ START - Final Power-On Check
      ansible.builtin.shell: "virsh start {{ item.name }}"
      register: start_res
      failed_when: start_res.rc != 0 and 'already active' not in start_res.stderr
      loop: "{{ vm_list if not bootstrap_only else [vm_list[0]] }}"

    - name: 🔓 STATUS - Selective Deployment Complete
      ansible.builtin.debug:
        msg: "OKD Deployment finished. Mode: {{ 'Bootstrap Only' if bootstrap_only else 'Full Cluster' }}"
