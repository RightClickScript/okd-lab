---
- name: Phase 1-1d - Restore K3s Service File
  hosts: local_spark
  become: true

  tasks:
    - name: 🛠️ RESTORE - Overwrite K3s Service File with correct syntax
      ansible.builtin.copy:
        dest: /etc/systemd/system/k3s.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Lightweight Kubernetes
          Documentation=https://k3s.io
          Wants=network-online.target
          After=network-online.target

          [Install]
          WantedBy=multi-user.target

          [Service]
          Type=notify
          EnvironmentFile=-/etc/default/%N
          EnvironmentFile=-/etc/sysconfig/%N
          EnvironmentFile=-/etc/systemd/system/k3s.service.env
          KillMode=process
          Delegate=yes
          User=root
          LimitNOFILE=1048576
          LimitNPROC=infinity
          LimitCORE=infinity
          TasksMax=infinity
          TimeoutStartSec=0
          Restart=always
          RestartSec=5s
          ExecStartPre=-/sbin/modprobe br_netfilter
          ExecStartPre=-/sbin/modprobe overlay
          ExecStart=/usr/local/bin/k3s \
              server \
                  '--write-kubeconfig-mode' \
                  '644' \
                  '--disable' \
                  'traefik' \
                  '--disable' \
                  'servicelb' \
                  '--node-ip' \
                  '192.168.199.5'

    - name: 🔄 RESTART - Reload and Restart
      ansible.builtin.systemd:
        daemon_reload: true
        name: k3s
        state: restarted
        enabled: true
