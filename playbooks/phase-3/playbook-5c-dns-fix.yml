---
- name: Phase 3-1c - Fix DNS PTR & OKD Readiness
  hosts: windows
  gather_facts: false

  vars:
    reverse_zone: "199.168.192.in-addr.arpa"
    unifi_router: "192.168.1.1"

  tasks:
    - name: 🌐 REVERSE - Create Reverse Lookup Zone (192.168.199.x)
      ansible.windows.win_dns_zone:
        name: "{{ reverse_zone }}"
        replication: forest
        type: primary
        state: present

    - name: 📂 INFRA - Sync Physical Hardware to AD DNS
      ansible.windows.win_dns_record:
        name: "{{ item.name }}"
        zone: "{{ ad.domain_FQDN }}"
        type: "A"
        value: "{{ item.ip }}"
        state: present
      loop:
        - { name: "sms-1", ip: "192.168.199.4" }
        - { name: "nuc-1", ip: "192.168.199.1" }
        - { name: "nuc-2", ip: "192.168.199.2" }
        - { name: "nuc-3", ip: "192.168.199.3" }
        - { name: "lpt-1", ip: "192.168.199.5" }

    - name: 📂 OKD - Create Static Node Records
      ansible.windows.win_dns_record:
        name: "{{ item.name }}"
        zone: "{{ ad.domain_FQDN }}"
        type: "A"
        value: "{{ item.ip }}"
        state: present
      loop:
        - { name: "okd-bootstrap", ip: "192.168.199.20" }
        - { name: "okd-master-01", ip: "192.168.199.21" }
        - { name: "okd-master-02", ip: "192.168.199.22" }
        - { name: "okd-master-03", ip: "192.168.199.23" }

    - name: 📂 OKD - Create API Round-Robin Records
      ansible.windows.win_dns_record:
        name: "{{ item.name }}"
        zone: "{{ ad.domain_FQDN }}"
        type: "A"
        value: "{{ item.ip }}"
        state: present
      loop:
        # Both API and API-INT point to Bootstrap + All Masters during install
        - { name: "api.okd", ip: "192.168.199.20" }
        - { name: "api.okd", ip: "192.168.199.21" }
        - { name: "api.okd", ip: "192.168.199.22" }
        - { name: "api.okd", ip: "192.168.199.23" }
        - { name: "api-int.okd", ip: "192.168.199.20" }
        - { name: "api-int.okd", ip: "192.168.199.21" }
        - { name: "api-int.okd", ip: "192.168.199.22" }
        - { name: "api-int.okd", ip: "192.168.199.23" }

    - name: 📂 OKD - Create Wildcard Apps Record
      ansible.windows.win_dns_record:
        name: "*.apps.okd"
        zone: "{{ ad.domain_FQDN }}"
        type: "A"
        value: "192.168.199.21" # Pointing to Master 01 for now
        state: present

    - name: 🔄 RESTART - Restart DNS Service
      ansible.windows.win_service:
        name: DNS
        state: restarted

    - name: 🔓 STATUS - DNS Ready for OKD
      ansible.builtin.debug:
        msg: "DNS is live on Identity-01. OKD nodes can now resolve api-int.okd.homelab.local."
