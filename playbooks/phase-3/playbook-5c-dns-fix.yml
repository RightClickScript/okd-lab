---
- name: Phase 3.5c - Identity (Fix DNS & OKD Records)
  hosts: windows
  gather_facts: false

  tasks:
    - name: 🧹 CLEAN - Remove old/conflicting OKD records
      ansible.windows.win_dns_record:
        name: "{{ item }}"
        zone: "{{ ad.domain_FQDN }}"
        type: "A"
        state: absent
      loop:
        - "api.okd"
        - "api-int.okd"
        - "*.apps"
        - "*.apps.okd"
        - "console-openshift-console.apps.okd"

    - name: 📂 OKD - Create API Records (Point to Load Balancer)
      ansible.windows.win_dns_record:
        name: "{{ item }}"
        zone: "{{ ad.domain_FQDN }}"
        type: "A"
        value: "{{ network.okd_lb_ip }}"
        state: present
      loop:
        - "api.okd"
        - "api-int.okd"
        - "*.apps.okd"

    - name: 🔓 STATUS - Windows DNS Updated
      ansible.builtin.debug:
        msg: "DNS records for OKD now point exclusively to the Load Balancer IP ({{ network.okd_lb_ip }})."
