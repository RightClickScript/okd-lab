---
- name: Phase 3.5c - Identity (Fix DNS & OKD Records)
  hosts: windows
  gather_facts: false

  tasks:
    - name: 🧹 CLEAN - Remove old/conflicting OKD records
      ansible.windows.win_dns_record:
        name: "{{ item }}"
        zone: "{{ ad.domain_FQDN }}"
        type: "A"
        state: absent
      loop:
        - "api.okd"
        - "api-int.okd"
        - "*.apps.okd"
        - "okd-worker-01"
        - "okd-worker-02"
        - "okd-worker-03"

    - name: 📂 OKD - Create API Records (Point to Load Balancer)
      ansible.windows.win_dns_record:
        name: "{{ item }}"
        zone: "{{ ad.domain_FQDN }}"
        type: "A"
        value: "{{ network.okd_lb_ip }}"
        state: present
      loop:
        - "api.okd"
        - "api-int.okd"
        - "*.apps.okd"

    - name: 📂 OKD - Create Worker Records (Static IPs)
      ansible.windows.win_dns_record:
        name: "{{ item.name }}"
        zone: "{{ ad.domain_FQDN }}"
        type: "A"
        value: "{{ item.ip }}"
        state: present
      loop:
        - { name: "okd-worker-01", ip: "192.168.199.31" }
        - { name: "okd-worker-02", ip: "192.168.199.32" }
        - { name: "okd-worker-03", ip: "192.168.199.33" }

    - name: 🔓 STATUS - Windows DNS Updated
      ansible.builtin.debug:
        msg: "Full Cluster DNS is now active. API points to .60 and Workers have unique records."
