---
- name: Phase 4.1 - Generate OKD Ignition (lpt-1)
  hosts: local_spark
  become: true
  gather_facts: false

  vars:
    install_dir: "/opt/okd-cluster"
    distribution_root: "/mnt/data/distribution"

  tasks:
    - name: 🔐 SECRET - Load Pull Secret from Hub
      ansible.builtin.shell: "cat {{ distribution_root }}/secrets/pull_secret.json"
      register: pull_secret_content
      changed_when: false

    - name: 📁 PREP - Create Install Directory
      ansible.builtin.file:
        path: "{{ install_dir }}"
        state: directory
        mode: '0755'

    - name: 📄 CONFIG - Generate install-config.yaml
      ansible.builtin.template:
        src: "../../templates/okd/install-config.yaml.j2"
        dest: "{{ install_dir }}/install-config.yaml"
        mode: "0644"

    - name: 📦 TOOLS - Ensure OKD Binaries exist on lpt-1
      ansible.builtin.shell: |
        if ! command -v openshift-install &> /dev/null; then
          curl -L {{ artifacts.okd_install_url }} | tar -xz -C /usr/local/bin
        fi
      changed_when: false

    - name: 🔥 IGNITION - Generate Cluster Ignition Files
      ansible.builtin.command:
        cmd: "openshift-install create ignition-configs --dir={{ install_dir }}"
      args:
        creates: "{{ install_dir }}/bootstrap.ign"

    - name: 📤 PUBLISH - Move Ignition to Distro Hub
      ansible.builtin.copy:
        src: "{{ install_dir }}/{{ item }}"
        dest: "{{ distribution_root }}/ign/{{ item }}"
        remote_src: true
        mode: "0644"
        owner: 1001
        group: 1001
      loop:
        - bootstrap.ign
        - master.ign
        - worker.ign

- name: Phase 4.2 - Provision OKD Master VMs on SMS-1
  hosts: management_plane
  become: true
  gather_facts: false

  vars:
    vm_root: "/mnt/data/vms"
    # SCOS QCOW2 image should be in the hub ISO folder
    scos_image_url: "http://192.168.199.5:8080/iso/scos-live.x86_64.iso"

  tasks:
    - name: 🏗️ VM - Create OKD Master and Bootstrap VMs
      ansible.builtin.shell: |
        virt-install \
          --name {{ item.name }} \
          --ram {{ item.ram }} \
          --vcpus {{ item.cpu }} \
          --os-variant fedora-coreos-stable \
          --disk path={{ vm_root }}/{{ item.name }}.qcow2,size={{ item.disk }},bus=virtio \
          --location {{ scos_image_url }},kernel=casper/vmlinuz,initrd=casper/initrd \
          --network bridge=br0,model=virtio \
          --graphics vnc,listen=0.0.0.0 \
          --noautoconsole \
          --wait 0 \
          --extra-args "rd.neednet=1 ip=dhcp ignition.firstboot ignition.platform.id=qemu ignition.config.url=http://192.168.199.5:8080/ign/{{ item.role }}.ign"
      args:
        creates: "/etc/libvirt/qemu/{{ item.name }}.xml"
      loop:
        - { name: "okd-bootstrap", ram: 16384, cpu: 4, disk: 100, role: "bootstrap" }
        - { name: "okd-master-01", ram: 16384, cpu: 4, disk: 100, role: "master" }
        - { name: "okd-master-02", ram: 16384, cpu: 4, disk: 100, role: "master" }
        - { name: "okd-master-03", ram: 16384, cpu: 4, disk: 100, role: "master" }

    - name: 🔓 STATUS - OKD Deployment Started
      ansible.builtin.debug:
        msg: "OKD Masters are deploying on SMS-1. Monitor bootstrap with: openshift-install wait-for bootstrap-complete --dir=/opt/okd-cluster"
