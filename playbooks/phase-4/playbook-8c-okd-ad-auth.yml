---
- name: Phase 4.3 - OKD Active Directory Integration
  hosts: local_spark
  become: true
  gather_facts: false

  vars:
    dc_ip: "192.168.199.10"
    domain: "homelab.local"
    bind_dn: "CN=okd_admin,OU=Lab,DC=homelab,DC=local"
    bind_password: "Admin@12345"
    user_search_base: "OU=Lab,DC=homelab,DC=local"
    kubeconfig: "/opt/okd-cluster/auth/kubeconfig"

  tasks:
    - name: 🔐 SECRET - Create LDAP Bind Password Secret
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        oc create secret generic ldap-secret --from-literal=bindPassword={{ bind_password }} -n openshift-config --dry-run=client -o yaml | oc apply -f -
      changed_when: true

    - name: ⚙️ CONFIG - Apply LDAP Identity Provider
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        cat <<EOF | oc apply -f -
        apiVersion: config.openshift.io/v1
        kind: OAuth
        metadata:
          name: cluster
        spec:
          identityProviders:
          - name: Homelab-AD
            mappingMethod: claim
            type: LDAP
            ldap:
              attributes:
                id: ["dn"]
                email: ["mail"]
                name: ["cn"]
                preferredUsername: ["sAMAccountName"]
              bindDN: "{{ bind_dn }}"
              bindPassword:
                name: ldap-secret
              ca:
                name: "" 
              insecure: true
              url: "ldap://{{ dc_ip }}:389/{{ user_search_base }}?sAMAccountName?sub"
        EOF
      changed_when: true

    - name: 👑 RBAC - Grant Cluster Admin to AD Admins
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        oc adm policy add-cluster-role-to-user cluster-admin okd_admin || true
        oc adm policy add-cluster-role-to-user cluster-admin Administrator || true
      changed_when: true

    - name: 🔓 STATUS - AD Integration Applied
      ansible.builtin.debug:
        msg: "LDAP Integration applied."
