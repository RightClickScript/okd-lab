all:
  vars:
    ansible_user: "bishop"
    ansible_password: "Admin@12345"
    ansible_become_password: "Admin@12345"
    ansible_python_interpreter: "/usr/bin/python3.12"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new -o StrictHostKeyChecking=no"

    # AD & DNS Configuration (Migrated from AD-TEST)
    ad:
      domain_NetBIOS: "homelab"
      domain_FQDN: "homelab.local"
      mode: "WinThreshold"
      upstream_dns_1: "8.8.8.8"
      upstream_dns_2: "8.8.4.4"
      reverse_dns_zone: "192.168.199.0/24"

    dcdetails:
      name: "identity-01"
      IPAddress: "192.168.199.10"
      Memory: 4096
      CPU: 2
      BootDiskSize: 40
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: "{{ ansible_playbook_python }}"
    container_host:
      ansible_host: 192.168.199.5
      physical_iface: enp0s25
      ansible_python_interpreter: "/home/bishop/source/okd-lab/.venv/bin/python3"
      semaphore_port: 3000
      vault_ui_port: 30002
      vault_api_port: 30001
      awx_port: 30005
    amd_epyc:
      ansible_host: 192.168.199.4
      mac: "5e:dc:07:8f:3e:01"
      physical_iface: eno1
    nuc_1:
      ansible_host: 192.168.199.1
      mac: "22:27:c6:e0:ab:1a"
      physical_iface: eno1
    nuc_2:
      ansible_host: 192.168.199.2
      mac: "02:0f:a8:43:7f:47"
      physical_iface: eno1
    nuc_3:
      ansible_host: 192.168.199.3
      mac: "9e:cb:b7:23:f4:38"
      physical_iface: eno1
    identity_01:
      ansible_host: 192.168.199.10
  children:
    local_spark:
      hosts:
        container_host:
    management_plane:
      hosts:
        amd_epyc:
    compute_plane:
      hosts:
        nuc_1:
        nuc_2:
        nuc_3:
    windows:
      hosts:
        identity_01:
      vars:
        ansible_user: "administrator"
        # ansible_password: "{{ ansible_password }}"
        ansible_connection: "winrm"
        ansible_winrm_transport: "basic"
        ansible_winrm_server_cert_validation: "ignore"
        ansible_port: 5985
