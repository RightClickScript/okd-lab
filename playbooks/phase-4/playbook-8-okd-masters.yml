---
- name: Phase 4.1 - Generate OKD Configs and Extract Boot Files (lpt-1)
  hosts: local_spark
  become: true
  gather_facts: false

  vars:
    install_dir: "/opt/okd-cluster"
    distribution_root: "/mnt/data/distribution"

  tasks:
    - name: 🔐 SECRET - Load Pull Secret from Hub
      ansible.builtin.shell: "cat {{ distribution_root }}/secrets/pull_secret.json"
      register: pull_secret_content
      changed_when: false

    - name: 📌 SET - Define Pull Secret Fact
      ansible.builtin.set_fact:
        pull_secret: "{{ pull_secret_content.stdout | from_json | to_json }}"

    - name: 📁 PREP - Create Install Directory
      ansible.builtin.file:
        path: "{{ install_dir }}"
        state: directory
        mode: '0755'

    - name: 📄 CONFIG - Generate install-config.yaml
      ansible.builtin.template:
        src: "../../templates/okd/install-config.yaml.j2"
        dest: "{{ install_dir }}/install-config.yaml"
        mode: "0644"

    - name: 🔥 IGNITION - Generate Cluster Ignition Files
      ansible.builtin.command:
        cmd: "openshift-install create ignition-configs --dir={{ install_dir }}"
      args:
        creates: "{{ install_dir }}/bootstrap.ign"

    - name: 🛠️ PATCH - Inject Static IPs and Password into Ignition
      ansible.builtin.shell: |
        cat <<EOF > /tmp/patch_ignition.py
        import json, base64, sys
        
        name = sys.argv[1]
        ip = sys.argv[2]
        role = sys.argv[3]
        file_path = f"{{ install_dir }}/{role}.ign"
        
        with open(file_path, 'r') as f:
            data = json.load(f)
        
        if "passwd" not in data: data["passwd"] = {}
        if "users" not in data["passwd"]: data["passwd"]["users"] = []
        
        core_user = next((u for u in data["passwd"]["users"] if u["name"] == "core"), None)
        if core_user:
            core_user["passwordHash"] = "$6$2.AkBiINvK6sG1Xc$4IpxnmmRZ0HhXgtndXgOIs7YYQ7cXdV.ub3Lmus3OBDJYqMi5HHzw/bGSlDUmGIFfTVjVB4.vIrNeeQPUrnKW1"
        else:
            data["passwd"]["users"].append({
                "name": "core",
                "passwordHash": "$6$2.AkBiINvK6sG1Xc$4IpxnmmRZ0HhXgtndXgOIs7YYQ7cXdV.ub3Lmus3OBDJYqMi5HHzw/bGSlDUmGIFfTVjVB4.vIrNeeQPUrnKW1"
            })

        nm_config = f"""[connection]
        id=enp1s0
        type=ethernet
        interface-name=enp1s0
        
        [ipv4]
        address1={ip}/24,{{ network.mgmt_gateway }}
        dns=192.168.199.10;
        dns-search={{ network.search_domains[0] }};
        method=manual
        """
        
        new_file = {
            "path": "/etc/NetworkManager/system-connections/enp1s0.nmconnection",
            "mode": 384,
            "contents": {
                "source": "data:text/plain;charset=utf-8;base64," + base64.b64encode(nm_config.encode()).decode()
            }
        }
        
        if "storage" not in data: data["storage"] = {}
        if "files" not in data["storage"]: data["storage"]["files"] = []
        data["storage"]["files"].append(new_file)
        
        with open(f"{{ install_dir }}/{name}.ign", 'w') as f:
            json.dump(data, f)
        EOF
        
        python3 /tmp/patch_ignition.py okd-bootstrap 192.168.199.20 bootstrap
        python3 /tmp/patch_ignition.py okd-master-01 192.168.199.21 master
        python3 /tmp/patch_ignition.py okd-master-02 192.168.199.22 master
        python3 /tmp/patch_ignition.py okd-master-03 192.168.199.23 master
      changed_when: true

    - name: 💿 BOOT - Extract Kernel, Initrd, and RootFS from SCOS ISO
      ansible.builtin.shell: |
        mkdir -p /tmp/scos-mnt
        mount -o loop {{ distribution_root }}/iso/scos-live.x86_64.iso /tmp/scos-mnt
        cp /tmp/scos-mnt/images/pxeboot/vmlinuz {{ distribution_root }}/iso/vmlinuz
        cp /tmp/scos-mnt/images/pxeboot/initrd.img {{ distribution_root }}/iso/initrd.img
        cp /tmp/scos-mnt/images/pxeboot/rootfs.img {{ distribution_root }}/iso/rootfs.img
        umount /tmp/scos-mnt
        chmod 644 {{ distribution_root }}/iso/vmlinuz {{ distribution_root }}/iso/initrd.img {{ distribution_root }}/iso/rootfs.img
      changed_when: true

    - name: 📤 PUBLISH - Move Patched Ignition to Distro Hub
      ansible.builtin.copy:
        src: "{{ install_dir }}/{{ item }}.ign"
        dest: "{{ distribution_root }}/ign/{{ item }}.ign"
        remote_src: true
        mode: "0644"
        owner: 1001
        group: 1001
      loop: [okd-bootstrap, okd-master-01, okd-master-02, okd-master-03, worker]

- name: Phase 4.2 - Provision OKD Master VMs on SMS-1 (Auto-Restart Safety)
  hosts: management_plane
  become: true
  gather_facts: false

  vars:
    vm_root: "/mnt/data/vms"
    hub_url: "http://192.168.199.5:8080"

  tasks:
    - name: 💿 BOOT - Download Kernel and Initrd to SMS-1
      ansible.builtin.get_url:
        url: "{{ hub_url }}/iso/{{ item }}"
        dest: "{{ vm_root }}/{{ item }}"
        mode: "0644"
      loop: [vmlinuz, initrd.img]

    - name: 🏗️ VM - Create OKD Master and Bootstrap VMs
      ansible.builtin.shell: |
        # Destroy existing VM
        virsh destroy {{ item.name }} || true
        virsh undefine {{ item.name }} --remove-all-storage || true
        
        virt-install \
          --name {{ item.name }} \
          --ram {{ item.ram }} \
          --vcpus {{ item.cpu }} \
          --os-variant fedora-coreos-stable \
          --disk path={{ vm_root }}/{{ item.name }}.qcow2,size={{ item.disk }},bus=virtio \
          --install kernel={{ vm_root }}/vmlinuz,initrd={{ vm_root }}/initrd.img \
          --network bridge=br0,model=virtio \
          --graphics vnc,listen=0.0.0.0 \
          --noautoconsole \
          --wait 0 \
          --events on_reboot=restart,on_crash=restart \
          --extra-args "rd.neednet=1 ip=dhcp coreos.inst.install_dev=/dev/vda coreos.inst.ignition_url={{ hub_url }}/ign/{{ item.name }}.ign coreos.live.rootfs_url={{ hub_url }}/iso/rootfs.img coreos.inst.reboot"
      args:
        creates: "/etc/libvirt/qemu/{{ item.name }}.xml"
      loop:
        - { name: "okd-bootstrap", ram: 16384, cpu: 4, disk: 100 }
        - { name: "okd-master-01", ram: 16384, cpu: 4, disk: 100 }
        - { name: "okd-master-02", ram: 16384, cpu: 4, disk: 100 }
        - { name: "okd-master-03", ram: 16384, cpu: 4, disk: 100 }

    - name: ⏳ WAIT - Wait for installation to finish (VMs to stop)
      ansible.builtin.shell: "virsh list --name | grep {{ item.name }}"
      register: vm_list
      until: vm_list.rc != 0
      retries: 60
      delay: 30
      loop:
        - { name: "okd-bootstrap" }
        - { name: "okd-master-01" }
        - { name: "okd-master-02" }
        - { name: "okd-master-03" }
      ignore_errors: true

    - name: ⚡ START - Ensure VMs are Running from Disk
      ansible.builtin.shell: "virsh start {{ item.name }}"
      register: start_res
      failed_when: start_res.rc != 0 and 'already active' not in start_res.stderr
      loop:
        - { name: "okd-bootstrap" }
        - { name: "okd-master-01" }
        - { name: "okd-master-02" }
        - { name: "okd-master-03" }

    - name: 🔓 STATUS - OKD Deployment Complete
      ansible.builtin.debug:
        msg: "OKD Masters are now booting using Windows AD DNS (192.168.199.10)."
