---
- name: Phase 3-6 - Deploy OKD Load Balancer (Install-Ready & TSO Hardened)
  hosts: local_spark
  become: true
  gather_facts: false

  vars:
    lb_ip: "192.168.199.60"
    api_port: 6443
    mcs_port: 22623
    http_port: 80
    https_port: 443
    bootstrap_ip: "192.168.199.20"
    masters:
      - { name: "okd-master-01", ip: "192.168.199.21" }
      - { name: "okd-master-02", ip: "192.168.199.22" }
      - { name: "okd-master-03", ip: "192.168.199.23" }
    workers:
      - { name: "okd-worker-01", ip: "192.168.199.31" }
      - { name: "okd-worker-02", ip: "192.168.199.32" }
      - { name: "okd-worker-03", ip: "192.168.199.33" }

  tasks:
    - name: 🏗️ TSO - Update hardening script (Add GSO/GRO off)
      ansible.builtin.copy:
        dest: /usr/local/bin/disable-tso.sh
        mode: '0755'
        content: |
          #!/bin/bash
          for iface in $(ls /sys/class/net); do
              if [[ "$iface" == "lo" ]] || [[ ! -e "/sys/class/net/$iface/device" ]]; then
                  continue
              fi
              echo "Hardening $iface: Disabling TSO, GSO, GRO"
              ethtool -K "$iface" tso off gso off gro off rxvlan off txvlan off 2>/dev/null || true
          done

    - name: ⚙️ CONFIG - Generate haproxy.cfg (Bootstrap-Priority)
      ansible.builtin.blockinfile:
        path: /etc/haproxy/haproxy.cfg
        marker: "# {mark} OKD LOAD BALANCER CONFIG"
        block: |
          #---------------------------------------------------------------------
          # OKD API (6443) - Mixed (Bootstrap + Masters)
          #---------------------------------------------------------------------
          frontend okd-api
              bind {{ lb_ip }}:{{ api_port }}
              mode tcp
              default_backend okd-api-backend

          backend okd-api-backend
              mode tcp
              balance roundrobin
              server okd-bootstrap {{ bootstrap_ip }}:{{ api_port }} check
              {% for node in masters %}
              server {{ node.name }} {{ node.ip }}:{{ api_port }} check
              {% endfor %}

          #---------------------------------------------------------------------
          # OKD Machine Config Server (22623) - BOOTSTRAP ONLY
          # This is critical for the initial install!
          #---------------------------------------------------------------------
          frontend okd-mcs
              bind {{ lb_ip }}:{{ mcs_port }}
              mode tcp
              default_backend okd-mcs-backend

          backend okd-mcs-backend
              mode tcp
              server okd-bootstrap {{ bootstrap_ip }}:{{ mcs_port }} check

          #---------------------------------------------------------------------
          # OKD Ingress (80/443) - Workers
          #---------------------------------------------------------------------
          backend okd-http-backend
              mode tcp
              {% for node in workers %}
              server {{ node.name }} {{ node.ip }}:{{ http_port }} check
              {% endfor %}

          backend okd-https-backend
              mode tcp
              {% for node in workers %}
              server {{ node.name }} {{ node.ip }}:{{ https_port }} check
              {% endfor %}

    - name: 🔄 RESTART - Apply Configuration
      ansible.builtin.systemd:
        name: haproxy
        state: restarted
