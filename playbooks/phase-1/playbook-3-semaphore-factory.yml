---
- name: Phase 1-3 - Deploy and Seed Semaphore Factory (Total Idempotency)
  hosts: localhost
  gather_facts: false

  vars:
    kubeconfig_path: "{{ playbook_dir }}/../../.lpt1_kubeconfig"
    key_path: "{{ playbook_dir }}/../../.semaphore_deploy_key"
    project_name: "Homelab Infrastructure"
    admin_user: "admin"
    semaphore_url: "http://192.168.199.50"

    templates:
      - { name: "Phase 0: Lab Control (Shutdown)", playbook: "playbooks/phase-0/playbook-lab-power.yml", arguments: "--tags power_off" }
      - { name: "Phase 0: Lab Control (Startup)", playbook: "playbooks/phase-0/playbook-lab-power.yml", arguments: "--tags power_on" }
      - { name: "Phase 0: Lab Connectivity Validation", playbook: "playbooks/phase-0/playbook-lab-validate.yml" }
      - { name: "Phase 0: Standardize Lab Networking", playbook: "playbooks/phase-0/playbook-network-standard.yml" }
      - { name: "Factory: Deploy HashiCorp Vault", playbook: "playbooks/phase-1/playbook-4-vault-deploy.yml" }
      - { name: "Factory: Deploy Ansible AWX", playbook: "playbooks/phase-1/playbook-5-awx-deploy.yml" }
      - { name: "Factory: Deploy Netboot (PXE Server)", playbook: "playbooks/phase-1/playbook-6-netboot-deploy.yml" }
      - { name: "Phase 2: Standardize Hypervisors (SMS & NUCs)", playbook: "playbooks/phase-2/playbook-3-hypervisor-standard.yml" }
      - { name: "Phase 3: Identity (Deploy Windows VM)", playbook: "playbooks/phase-3/playbook-5-identity.yml" }
      - { name: "Phase 3: Identity (Configure AD Domain)", playbook: "playbooks/phase-3/playbook-5b-ad-config.yml" }
      - { name: "Phase 3: Identity (Fix DNS & OKD Records)", playbook: "playbooks/phase-3/playbook-5c-dns-fix.yml" }
      - { name: "Phase 3: OKD Load Balancer (HAProxy)", playbook: "playbooks/phase-3/playbook-6-load-balancer.yml" }
      - { name: "Phase 3: Morpheus Appliance", playbook: "playbooks/phase-3/playbook-7-morpheus.yml" }
      - { name: "Phase 4: OKD Control Plane (Full Fleet)", playbook: "playbooks/phase-4/playbook-8-okd-masters.yml" }
      - { name: "Phase 4: OKD Bootstrap (Wait & Handoff)", playbook: "playbooks/phase-4/playbook-8b-okd-bootstrap-wait.yml" }
      - { name: "Phase 4: OKD Identity (AD Integration)", playbook: "playbooks/phase-4/playbook-8c-okd-ad-auth.yml" }

  tasks:
    - name: 🔑 AUTH - Login
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/auth/login"
        method: POST
        body_format: json
        body: { auth: "{{ admin_user }}", password: "{{ ansible_password }}" }
        headers: { Host: "semaphore.homelab.local" }
        status_code: [200, 204]
      register: login_response

    - name: 🔎 INFO - Get Project ID
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/projects"
        method: GET
        headers:
          Cookie: "{{ login_response.cookies_string }}"
          Host: "semaphore.homelab.local"
      register: plist

    - name: 📌 SET - Define Project ID
      ansible.builtin.set_fact:
        pid: "{{ (plist.json | selectattr('name', 'equalto', project_name) | first).id }}"

    - name: 🔄 REFRESH - Get Resource IDs (Discovery)
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ pid }}/{{ item }}"
        method: GET
        headers:
          Cookie: "{{ login_response.cookies_string }}"
          Host: "semaphore.homelab.local"
      loop: [keys, environment, repositories, inventory, templates]
      register: resources

    # --- DUPLICATE CLEANUP ---
    - name: 🧹 CLEANUP - Keys
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ pid }}/keys/{{ item.id }}"
        method: DELETE
        headers: { Cookie: "{{ login_response.cookies_string }}", Host: "semaphore.homelab.local" }
        status_code: [204]
      loop: "{{ (resources.results[0].json | selectattr('name', 'in', ['Bishop SSH Key', 'Git Deploy Key']) | list)[2:] }}"
      when: resources.results[0].json | length > 2

    - name: 🧹 CLEANUP - Environments
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ pid }}/environment/{{ item.id }}"
        method: DELETE
        headers: { Cookie: "{{ login_response.cookies_string }}", Host: "semaphore.homelab.local" }
        status_code: [204]
      loop: "{{ (resources.results[1].json | selectattr('name', 'equalto', 'Lab Global Environment') | list)[1:] }}"
      when: resources.results[1].json | length > 1

    - name: 🧹 CLEANUP - Templates (Wipe buttons)
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ pid }}/templates/{{ item.id }}"
        method: DELETE
        headers: { Cookie: "{{ login_response.cookies_string }}", Host: "semaphore.homelab.local" }
        status_code: [204]
      loop: "{{ resources.results[4].json }}"
      when: resources.results[4].json | length > 0

    # --- SEEDING (Missing Only) ---
    - name: 🗝️ KEYS - Seed SSH Keys
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ pid }}/keys"
        method: POST
        body_format: json
        body:
          name: "{{ item }}"
          type: "ssh"
          project_id: "{{ pid | int }}"
          ssh: { private_key: "{{ lookup('file', key_path) }}" }
        headers: { Cookie: "{{ login_response.cookies_string }}", Host: "semaphore.homelab.local" }
        status_code: [201]
      loop: ["Bishop SSH Key", "Git Deploy Key"]
      when: (resources.results[0].json | selectattr('name', 'equalto', item) | list | length) == 0

    - name: 🌍 ENV - Create Lab Environment
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ pid }}/environment"
        method: POST
        body_format: json
        body:
          name: "Lab Global Environment"
          project_id: "{{ pid | int }}"
          json: |
            { "ANSIBLE_GALAXY_IGNORE_CERTS": "True", "PYTHONHTTPSVERIFY": "0", "ANSIBLE_HOST_KEY_CHECKING": "False" }
        headers: { Cookie: "{{ login_response.cookies_string }}", Host: "semaphore.homelab.local" }
        status_code: [201]
      when: (resources.results[1].json | selectattr('name', 'equalto', 'Lab Global Environment') | list | length) == 0

    # --- FINAL SYNC ---
    - name: 🔄 REFRESH - Final Resource Map
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ pid }}/{{ item }}"
        method: GET
        headers: { Cookie: "{{ login_response.cookies_string }}", Host: "semaphore.homelab.local" }
      loop: [keys, repositories, inventory, environment]
      register: final_map

    - name: 📌 SET - Define Final IDs
      ansible.builtin.set_fact:
        f_repo_id: "{{ (final_map.results[1].json | selectattr('name', 'equalto', 'OKD Lab Repo') | first).id }}"
        f_inv_id: "{{ (final_map.results[2].json | selectattr('name', 'equalto', 'Physical Hosts') | first).id }}"
        f_env_id: "{{ (final_map.results[3].json | selectattr('name', 'equalto', 'Lab Global Environment') | first).id }}"
        f_ssh_id: "{{ (final_map.results[0].json | selectattr('name', 'equalto', 'Bishop SSH Key') | first).id }}"

    - name: 🚀 TEMPLATES - Seed Fresh Task Buttons
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ pid }}/templates"
        method: POST
        body_format: json
        body:
          name: "{{ item.name }}"
          project_id: "{{ pid | int }}"
          inventory_id: "{{ f_inv_id | int }}"
          repository_id: "{{ f_repo_id | int }}"
          environment_id: "{{ f_env_id | int }}"
          ssh_key_id: "{{ f_ssh_id | int }}"
          playbook: "{{ item.playbook }}"
          extra_vars: "{{ item.vars | default({}) | to_json }}"
          app: "ansible"
          arguments: "[\"-vv\"]"
          allow_override_args_in_task: true
        headers: { Cookie: "{{ login_response.cookies_string }}", Host: "semaphore.homelab.local" }
        status_code: [201]
      loop: "{{ templates }}"
      ignore_errors: true

    - name: 🎉 FINISH - Success Message
      ansible.builtin.debug:
        msg: "Semaphore is now fully populated with ALL Phase 3 and Phase 4 buttons. Re-run complete."
