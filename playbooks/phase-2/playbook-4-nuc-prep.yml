---
- name: Phase 2.3a - NUC Sanitization & Networking
  hosts: compute_plane
  become: true
  gather_facts: true
  tasks:
    - name: 🛑 SANITIZATION - Remove LXD/LXC (If present)
      block:
        - name: Gather service facts
          ansible.builtin.service_facts:

        - name: Purge LXD/LXC and Snaps
          ansible.builtin.shell: |
            snap remove --purge lxd || true
            apt-get purge -y lxd lxd-client lxc lxcfs || true
            rm -rf /var/lib/lxd /var/snap/lxd /var/lib/lxcfs || true
          ignore_errors: true

    - name: 🌐 NETWORKING - Standardize with Netplan
      ansible.builtin.copy:
        dest: /etc/netplan/99-morpheus-infra.yaml
        mode: "0644"
        content: |
          network:
            version: 2
            ethernets:
              {{ physical_iface }}:
                dhcp4: no
            bonds:
              bond0:
                interfaces: [ "{{ physical_iface }}" ]
                parameters:
                  mode: active-backup
                addresses: [ "{{ ansible_host }}/24" ]
                routes:
                  - to: default
                    via: 192.168.199.254
                nameservers:
                  addresses: [ 192.168.1.1 ]
                  search: [ homelab.local ]
            vlans:
              vlan198:
                id: 198
                link: bond0
                dhcp4: yes

    - name: Apply Netplan
      ansible.builtin.command: netplan apply
      async: 10
      poll: 0

- name: Phase 2.3b - Factory Prep (WOL & Ignition Server)
  hosts: local_spark
  become: true
  tasks:
    - name: ⚡ WOL - Power On NUCs via Magic Packet
      ansible.builtin.command: "wakeonlan {{ hostvars[item]['mac'] }}"
      loop: "{{ groups['compute_plane'] }}"
      when: hostvars[item]['mac'] is defined
      changed_when: true

    - name: 📂 IGNITION - Setup Web Server
      block:
        - name: Create ignition storage directory
          ansible.builtin.file:
            path: /opt/ignition
            state: directory
            mode: '0755'

        - name: Generate Ignition JSON for each NUC
          ansible.builtin.copy:
            dest: "/opt/ignition/{{ item }}.json"
            content: |
              {
                "ignition": { "version": "3.4.0" },
                "passwd": {
                  "users": [
                    {
                      "name": "bishop",
                      "ssh_authorized_keys": [
                        "{{ ansible_ssh_public_key }}"
                      ],
                      "groups": ["sudo", "wheel"]
                    }
                  ]
                },
                "storage": {
                  "files": [
                    {
                      "path": "/etc/hostname",
                      "mode": 420,
                      "contents": { "source": "data:,{{ item | replace('_', '-') }}" }
                    }
                  ]
                }
              }
          loop: "{{ groups['compute_plane'] }}"

        - name: Start Nginx Container to serve Ignition files
          community.docker.docker_container:
            name: ignition-server
            image: nginx:alpine
            state: started
            restart_policy: always
            ports:
              - "8080:80"
            volumes:
              - /opt/ignition:/usr/share/nginx/html:ro

    - name: 🔓 STATUS - Ready for Compute Plane
      ansible.builtin.debug:
        msg: "NUCs sanitized. Ignition server active at http://192.168.199.5:8080"

- name: Phase 2.3c - Phoenix Rebuild (Bare-metal OS Provisioning)
  hosts: local_spark
  become: true
  vars:
    # Trigger this with: -e "target_nuc=nuc_1 phoenix_rebuild=true"
    phoenix_rebuild: false
    target_nuc: ""
    fcos_filename: "fedora-coreos-39.20240128.3.0-live.x86_64.iso"
  tasks:
    - name: 🔥 PHOENIX - Automate Fresh FCOS Installation (IP-KVM)
      block:
        - name: 🔍 CHECK - Ensure target NUC is specified
          ansible.builtin.fail:
            msg: "Please specify target_nuc (e.g., nuc_1)"
          when: target_nuc == ""

        - name: 🔌 SWITCH - Send TESmart Hotkeys (state=true/false)
          block:
            - name: Tap ControlRight (1)
              ansible.builtin.uri:
                url: "https://{{ kvm.ip }}/api/hid/events/send_key?key=ControlRight&state={{ item }}"
                method: POST
                validate_certs: false
                headers: { X-KVMD-User: "{{ kvm.user }}", X-KVMD-Passwd: "{{ kvm.pass }}" }
              loop: [ true, false ]
            - name: Tap ControlRight (2)
              ansible.builtin.uri:
                url: "https://{{ kvm.ip }}/api/hid/events/send_key?key=ControlRight&state={{ item }}"
                method: POST
                validate_certs: false
                headers: { X-KVMD-User: "{{ kvm.user }}", X-KVMD-Passwd: "{{ kvm.pass }}" }
              loop: [ true, false ]
            - name: Type Port Number
              ansible.builtin.uri:
                url: "https://{{ kvm.ip }}/api/hid/print"
                method: POST
                validate_certs: false
                headers: { X-KVMD-User: "{{ kvm.user }}", X-KVMD-Passwd: "{{ kvm.pass }}" }
                body: "{{ nuc_mgmt[target_nuc].port | string }}"

        - name: 💿 MEDIA - Trigger FCOS ISO Download on PiKVM
          ansible.builtin.uri:
            url: "https://{{ kvm.ip }}/api/msd/write_remote?url={{ kvm.iso_url }}"
            method: POST
            validate_certs: false
            headers: { X-KVMD-User: "{{ kvm.user }}", X-KVMD-Passwd: "{{ kvm.pass }}" }
          async: 600 # Let it run in background
          poll: 0
          register: iso_trigger

        - name: ⏳ MEDIA - Wait for ISO Download to complete
          ansible.builtin.uri:
            url: "https://{{ kvm.ip }}/api/msd/list"
            method: GET
            validate_certs: false
            headers: { X-KVMD-User: "{{ kvm.user }}", X-KVMD-Passwd: "{{ kvm.pass }}" }
          register: iso_list
          until: "iso_list.json.result | selectattr('name', 'equalto', fcos_filename) | list | length > 0"
          retries: 60
          delay: 10

        - name: 💿 MEDIA - Mount FCOS ISO (set_params)
          ansible.builtin.uri:
            url: "https://{{ kvm.ip }}/api/msd/set_params?image={{ fcos_filename }}&cdrom=1"
            method: POST
            validate_certs: false
            headers: { X-KVMD-User: "{{ kvm.user }}", X-KVMD-Passwd: "{{ kvm.pass }}" }

        - name: 🔄 REBOOT - Trigger Reboot on Target NUC (via SSH)
          ansible.builtin.command: "ssh {{ hostvars[target_nuc].ansible_user }}@{{ hostvars[target_nuc].ansible_host }} 'sudo reboot'"
          delegate_to: localhost
          ignore_errors: true

        - name: ⌨️ KEYS - Spam F10 for Boot Menu
          ansible.builtin.uri:
            url: "https://{{ kvm.ip }}/api/hid/events/send_key?key=F10&state={{ item }}"
            method: POST
            validate_certs: false
            headers:
              X-KVMD-User: "{{ kvm.user }}"
              X-KVMD-Passwd: "{{ kvm.pass }}"
          loop: [ true, false ]
          delay: 0.5
          retries: 10
          until: false
          ignore_errors: true

      when: phoenix_rebuild | bool
