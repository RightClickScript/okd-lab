---
- name: Phase 1-5 - Deploy Ansible AWX (via Ingress)
  hosts: lpt-1
  become: true
  gather_facts: false

  tasks:
    - name: 📦 HELM - Add AWX Operator Repo
      kubernetes.core.helm_repository:
        name: awx-operator
        repo_url: "https://ansible-community.github.io/awx-operator-helm/"

    - name: 🚀 DEPLOY - Install AWX Operator with Proxy Fix
      kubernetes.core.helm:
        name: awx-operator
        chart_ref: awx-operator/awx-operator
        release_namespace: "{{ awx.namespace }}"
        create_namespace: true
        chart_version: "{{ awx.version }}"
        kubeconfig: "{{ awx.kubeconfig }}"
        values:
          # Correct hierarchy for the official community chart
          operator-controller-containers:
            kube-rbac-proxy:
              image: "quay.io/brancz/kube-rbac-proxy:v0.15.0"
          # Ensure we don't try to use non-existent pull secrets
          image_pull_secrets: []
        wait: true

    - name: 📝 CONFIG - Deploy AWX Instance
      kubernetes.core.k8s:
        kubeconfig: "{{ awx.kubeconfig }}"
        state: present
        definition:
          apiVersion: awx.ansible.com/v1beta1
          kind: AWX
          metadata:
            name: awx
            namespace: "{{ awx.namespace }}"
          spec:
            service_type: ClusterIP
            ingress_type: none
            # Use local-path for K3s persistence
            postgres_storage_class: local-path
            web_resource_requirements:
              requests:
                cpu: 100m
                memory: 128Mi

    - name: 🌐 INGRESS - Create AWX Ingress Rule
      kubernetes.core.k8s:
        kubeconfig: "{{ awx.kubeconfig }}"
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: awx-ingress
            namespace: "{{ awx.namespace }}"
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: web
          spec:
            rules:
              - host: "{{ awx.hostname }}"
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: awx-service
                          port:
                            number: 80

    - name: 🎉 FINISH - Success Message
      ansible.builtin.debug:
        msg: "AWX is deploying at http://{{ awx.hostname }}. Monitor with: kubectl get pods -n {{ awx.namespace }}"
