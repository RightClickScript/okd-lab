---
- name: Phase 2.2 - AMD Epyc Hypervisor & Storage (Consolidated)
  hosts: management_plane
  become: true
  gather_facts: false

  vars:
    storage_pool_path: "/mnt/data/vms"
    storage_pool_name: "datapool"

  tasks:
    - name: 🏗️ HYPERVISOR - Install KVM & Libvirt
      ansible.builtin.apt:
        name: 
          - qemu-kvm
          - libvirt-daemon-system
          - libvirt-clients
          - bridge-utils
          - virtinst
          - virt-manager
          - ovmf
          - cockpit
          - cockpit-machines
          - zfsutils-linux
        state: present

    - name: 👥 ACCESS - Add bishop to libvirt group
      ansible.builtin.user:
        name: bishop
        groups: libvirt,kvm
        append: true

    - name: 📁 STORAGE - Initialize ZFS Datapool
      block:
        - name: Check if ZFS pool exists
          ansible.builtin.shell: "zpool list {{ lab_init.zpool_name }}"
          register: zpool_check
          ignore_errors: true
          changed_when: false

        - name: Create ZFS Datapool on NVMe
          ansible.builtin.command: "zpool create {{ lab_init.zpool_name }} {{ data_disk }} -m {{ lab_init.zfs_mount_point }}"
          when: zpool_check.rc != 0
          changed_when: true

        - name: Create VM Storage Dataset
          community.general.zfs:
            name: "{{ lab_init.zpool_name }}/vms"
            state: present
            extra_zfs_properties:
              mountpoint: "{{ storage_pool_path }}"

    - name: 📁 STORAGE - Configure Libvirt Storage Pool
      block:
        - name: Ensure storage directory exists
          ansible.builtin.file:
            path: "{{ storage_pool_path }}"
            state: directory
            owner: root
            group: root
            mode: "0755"

        - name: Define Libvirt Storage Pool
          community.libvirt.virt_pool:
            command: define
            name: "{{ storage_pool_name }}"
            xml: |
              <pool type='dir'>
                <name>{{ storage_pool_name }}</name>
                <target>
                  <path>{{ storage_pool_path }}</path>
                </target>
              </pool>

        - name: Start and Autostart Storage Pool
          community.libvirt.virt_pool:
            name: "{{ storage_pool_name }}"
            state: active
            autostart: true

    - name: 🌐 NETWORKING - Link Libvirt to br0 Bridge
      ansible.builtin.shell: |
        virsh net-destroy br0 || true
        virsh net-undefine br0 || true
        virsh net-define /dev/stdin <<EOF
        <network>
          <name>br0</name>
          <forward mode='bridge'/>
          <bridge name='br0'/>
        </network>
        EOF
        virsh net-start br0
        virsh net-autostart br0
      args:
        executable: /bin/bash
      changed_when: true

    - name: 🔓 STATUS - Ready for VMs
      ansible.builtin.debug:
        msg: "AMD Epyc is now fully prepared with ZFS NVMe storage and Bridged networking (Lesson Applied)."
