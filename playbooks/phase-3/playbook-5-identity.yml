---
- name: Phase 3-1 - Deploy MS AD/DNS (Identity)
  hosts: management_plane
  become: true
  gather_facts: false

  vars:
    # Remote paths on AMD Epyc (SMS-1) - Aligned with ZFS Datapool
    iso_root: "/mnt/data/vms"
    win_iso: "{{ iso_root }}/WinServer2022.iso"
    virtio_iso: "{{ iso_root }}/virtio-win.iso"
    unattended_iso: "{{ iso_root }}/unattended.iso"
    vm_name: "{{ dcdetails.name }}"

  tasks:
    - name: 📦 PREREQ - Download Windows Server ISO from Local Hub
      ansible.builtin.get_url:
        url: "{{ dcdetails.iso_url }}"
        dest: "{{ win_iso }}"
        mode: "0644"
        force: false
        timeout: 600

    - name: 📦 PREREQ - Download VirtIO Drivers (Idempotent)
      ansible.builtin.get_url:
        url: "https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/latest-virtio/virtio-win.iso"
        dest: "{{ virtio_iso }}"
        mode: "0644"
        force: false

    - name: 📄 TEMPLATE - Render Autounattend XML on Target
      ansible.builtin.template:
        src: "../../templates/windows/autounattend.xml.j2"
        dest: "/tmp/autounattend.xml"

    - name: 💿 ISO - Create Unattended ISO on Target
      ansible.builtin.shell: |
        genisoimage -output {{ unattended_iso }} -volid "unattended" -joliet -rock /tmp/autounattend.xml
      args:
        executable: /bin/bash

    - name: 💿 DISK - Create QCOW2 Disk in ZFS Datapool
      ansible.builtin.command:
        cmd: "qemu-img create -f qcow2 {{ iso_root }}/{{ vm_name }}.qcow2 {{ dcdetails.BootDiskSize }}G"
        creates: "{{ iso_root }}/{{ vm_name }}.qcow2"

    - name: 🏗️ VM - Define and Start Identity VM (Bridged to br0)
      ansible.builtin.shell: |
        virt-install \
          --name {{ vm_name }} \
          --ram {{ dcdetails.Memory }} \
          --vcpus {{ dcdetails.CPU }} \
          --os-variant win2k22 \
          --disk path={{ iso_root }}/{{ vm_name }}.qcow2,bus=virtio \
          --disk path={{ win_iso }},device=cdrom,bus=sata,readonly=on \
          --disk path={{ virtio_iso }},device=cdrom,bus=sata,readonly=on \
          --disk path={{ unattended_iso }},device=cdrom,bus=sata,readonly=on \
          --network bridge=br0,model=virtio \
          --graphics vnc,listen=0.0.0.0 \
          --noautoconsole \
          --boot cdrom,hd \
          --import
      args:
        creates: "/etc/libvirt/qemu/{{ vm_name }}.xml"

    - name: 🔓 STATUS - Deployment Started
      ansible.builtin.debug:
        msg: 
          - "Identity VM '{{ vm_name }}' is installing on SMS-1."
          - "Monitor graphical console via Cockpit: https://192.168.199.4:9090"
          - "VM will be reachable at {{ dcdetails.IPAddress }} shortly."
