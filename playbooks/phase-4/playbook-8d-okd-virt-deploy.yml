---
- name: Phase 4.4 - Deploy OpenShift Virtualization Operator
  hosts: lpt-1
  become: true
  gather_facts: false

  vars:
    kubeconfig: "/opt/okd-cluster/auth/kubeconfig"
    namespace: "kubevirt-hyperconverged"

  tasks:
    - name: 📁 NAMESPACE - Create KubeVirt Namespace
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        oc create namespace {{ namespace }} || true
      changed_when: true

    - name: 👥 GROUP - Create OperatorGroup
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        cat <<EOF | oc apply -f -
        apiVersion: operators.coreos.com/v1
        kind: OperatorGroup
        metadata:
          name: kubevirt-hyperconverged-group
          namespace: {{ namespace }}
        spec:
          targetNamespaces:
          - {{ namespace }}
        EOF
      changed_when: true

    - name: 📑 SUB - Create KubeVirt Subscription
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        cat <<EOF | oc apply -f -
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: community-kubevirt-hyperconverged
          namespace: {{ namespace }}
        spec:
          channel: stable
          installPlanApproval: Automatic
          name: community-kubevirt-hyperconverged
          source: community-operators
          sourceNamespace: openshift-marketplace
          startingCSV: kubevirt-hyperconverged-operator.v1.15.2
        EOF
      changed_when: true

    - name: ⏳ WAIT - Verify Operator Installation (Succeeded)
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        oc get csv -n {{ namespace }} | grep -i "kubevirt-hyperconverged" | grep -i "Succeeded"
      register: csv_check
      until: csv_check.rc == 0
      retries: 30
      delay: 20
      changed_when: false

    - name: 🔓 STATUS - Virtualization Operator is Ready
      ansible.builtin.debug:
        msg: "OpenShift Virtualization Operator v1.15.2 is installed. You can now deploy the HyperConverged resource."
