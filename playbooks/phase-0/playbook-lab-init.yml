---
- name: 📋 Phase 0.1 - Pre-Flight Artifact Check (Local)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: 🔍 CHECK - Verify Pull Secret exists
      ansible.builtin.stat:
        path: "../../playbooks/artifacts/secrets/pull_secret.json"
      register: pull_secret_stat

    - name: ❌ FAIL - Missing Pull Secret
      ansible.builtin.fail:
        msg: |
          ERROR: OKD Pull Secret is missing!
          Please place it in: playbooks/artifacts/secrets/pull_secret.json
          Download from: https://console.redhat.com/openshift/install/pull-secret
      when: not pull_secret_stat.stat.exists

- name: 🚀 Phase 0.2 - Full Lab Initialization (Master "Big Bang")
  hosts: lpt-1, sms-1
  become: true
  gather_facts: false

  tasks:
    - name: 📡 CONNECTION - Wait for SSH Connectivity
      ansible.builtin.wait_for_connection:
        timeout: 60
        delay: 5

    - name: 🔍 FACTS - Gather Host Facts
      ansible.builtin.setup:

    - name: 🏷️ HOSTNAME - Enforce Inventory Hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

    - name: 🔑 SSH - Authorize Public Key for Bishop
      ansible.posix.authorized_key:
        user: bishop
        state: present
        key: "{{ ansible_ssh_public_key }}"

    - name: 📦 SOFTWARE - Install Core Dependencies
      ansible.builtin.apt:
        name: [zfsutils-linux, nfs-common, curl, wget, git, python3-pip, docker.io, bridge-utils, cpu-checker, libvirt-daemon-system, libvirt-clients]
        state: present
        update_cache: yes

    - name: 🛡️ SECURITY - Configure AppArmor for Libvirt
      block:
        - name: Disable AppArmor for Libvirt (Fixes VM disk access issues)
          ansible.builtin.lineinfile:
            path: /etc/libvirt/qemu.conf
            regexp: '^#?security_driver =.*'
            line: 'security_driver = "none"'
          register: qemu_conf

        - name: Restart Libvirt
          ansible.builtin.systemd:
            name: libvirtd
            state: restarted
          when: qemu_conf is changed

    - name: 👥 ACCESS - Configure User Groups
      ansible.builtin.user:
        name: bishop
        groups: [docker, libvirt, kvm]
        append: yes

    - name: 🛠️ STORAGE - Initialize ZFS Data Pools (Atomic Rollback Hub)
      block:
        - name: Check if ZPool already exists
          ansible.builtin.command: "zpool list {{ lab_init.zpool_name }}"
          register: zpool_check
          failed_when: false
          changed_when: false

        - name: "Wipe disk and create ZPool (DANGER: Destructive)"
          ansible.builtin.shell: |
            # Release any existing locks or mounts
            umount {{ data_disk }}* || true
            wipefs -af {{ data_disk }}
            zpool create -f {{ lab_init.zpool_name }} {{ data_disk }}
            zfs set compression=lz4 {{ lab_init.zpool_name }}
            zfs set mountpoint={{ lab_init.zfs_mount_point }} {{ lab_init.zpool_name }}
          when: zpool_check.rc != 0

        - name: 📸 SNAPSHOT - Create Initial "Clean OS" Snapshot
          ansible.builtin.shell: |
            zfs list -t snapshot | grep -q "{{ lab_init.zpool_name }}@clean-install" || zfs snapshot {{ lab_init.zpool_name }}@clean-install
          register: snapshot_status
          changed_when: "'snapshot' in snapshot_status.stdout"
          ignore_errors: true

- name: 🌐 Phase 0.2b - Distribution Hub Setup (lpt-1)
  hosts: lpt-1
  become: true
  tasks:
    - name: 📁 STRUCTURE - Create Distribution Folders
      ansible.builtin.file:
        path: "{{ lab_init.distribution_root }}/{{ item }}"
        state: directory
        mode: '0755'
      loop: [iso, bin, ign, morpheus]

    - name: 🌐 NGINX - Configure Distribution Site
      block:
        - name: Install Nginx
          ansible.builtin.apt:
            name: nginx
            state: present

        - name: Configure Site
          ansible.builtin.copy:
            content: |
              server {
                listen 8080;
                root {{ lab_init.distribution_root }};
                autoindex on;
              }
            dest: /etc/nginx/sites-available/distribution
          register: nginx_conf

        - name: Enable Site
          ansible.builtin.file:
            src: /etc/nginx/sites-available/distribution
            dest: /etc/nginx/sites-enabled/distribution
            state: link

        - name: Remove Default Site
          ansible.builtin.file:
            path: /etc/nginx/sites-enabled/default
            state: absent

        - name: Restart Nginx
          ansible.builtin.systemd:
            name: nginx
            state: restarted
          when: nginx_conf is changed

    - name: 📥 DOWNLOAD - Fetch SCOS Live ISO
      ansible.builtin.get_url:
        url: "{{ artifacts.scos_iso_url }}"
        dest: "{{ lab_init.distribution_root }}/iso/scos-live.x86_64.iso"
        mode: '0644'
      when: lookup('ansible.builtin.fileglob', '../../playbooks/artifacts/iso/scos-live.x86_64.iso') == []

    - name: 📤 UPLOAD - Local SCOS ISO to Distribution Hub
      ansible.builtin.copy:
        src: "../../playbooks/artifacts/iso/scos-live.x86_64.iso"
        dest: "{{ lab_init.distribution_root }}/iso/scos-live.x86_64.iso"
        mode: '0644'
      when: lookup('ansible.builtin.fileglob', '../../playbooks/artifacts/iso/scos-live.x86_64.iso') != []

    - name: 📤 UPLOAD - Local Windows ISO to Distribution Hub
      ansible.builtin.copy:
        src: "../../playbooks/artifacts/iso/windows-server.iso"
        dest: "{{ lab_init.distribution_root }}/iso/windows-server.iso"
        mode: '0644'
      when: lookup('ansible.builtin.fileglob', '../../playbooks/artifacts/iso/windows-server.iso') != []

    - name: 📤 UPLOAD - Local Morpheus Binary to Distribution Hub
      ansible.builtin.copy:
        src: "../../playbooks/artifacts/bin/morpheus-appliance.deb"
        dest: "{{ lab_init.distribution_root }}/morpheus/morpheus-appliance.deb"
        mode: '0644'
      when: lookup('ansible.builtin.fileglob', '../../playbooks/artifacts/bin/morpheus-appliance.deb') != []

    - name: 🔍 CHECK - OKD Tools existence
      ansible.builtin.stat:
        path: "{{ lab_init.distribution_root }}/bin/oc"
      register: okd_tools_stat

    - name: 📥 DOWNLOAD - Fetch OKD 4.19.0-okd-scos.19 Release Tools
      block:
        - name: Download OKD Client
          ansible.builtin.get_url:
            url: "{{ artifacts.okd_client_url }}"
            dest: "/tmp/oc.tar.gz"
            mode: '0644'

        - name: Download OKD Installer
          ansible.builtin.get_url:
            url: "{{ artifacts.okd_install_url }}"
            dest: "/tmp/openshift-install.tar.gz"
            mode: '0644'

        - name: Extract oc binary
          ansible.builtin.unarchive:
            src: "/tmp/oc.tar.gz"
            dest: "{{ lab_init.distribution_root }}/bin/"
            remote_src: yes
            include: ["oc"]

        - name: Extract openshift-install binary
          ansible.builtin.unarchive:
            src: "/tmp/openshift-install.tar.gz"
            dest: "{{ lab_init.distribution_root }}/bin/"
            remote_src: yes
            include: ["openshift-install"]

        - name: Cleanup temp files
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop: ["/tmp/oc.tar.gz", "/tmp/openshift-install.tar.gz"]
      when: not okd_tools_stat.stat.exists

    - name: 🔑 PULL SECRET - Upload to Distribution Hub
      ansible.builtin.copy:
        src: "../../playbooks/artifacts/secrets/pull_secret.json"
        dest: "{{ lab_init.distribution_root }}/pull-secret.txt"
        mode: '0600'

- name: 🛡️ Phase 0.2c - Local Spark Bootstrap (lpt-1 Prep)
  hosts: lpt-1
  become: true
  tasks:
    - name: Ensure bishop is in docker group
      ansible.builtin.user:
        name: bishop
        groups: docker
        append: yes
