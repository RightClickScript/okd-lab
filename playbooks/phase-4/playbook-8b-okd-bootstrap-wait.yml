---
- name: Phase 4.1b - Wait for OKD Bootstrap & Verify Health
  hosts: lpt-1
  gather_facts: false
  vars:
    install_dir: "/opt/okd-cluster"
    lb_ip: "192.168.199.60"
    bootstrap_ip: "192.168.199.20"
    masters:
      - { name: "okd-master-01", ip: "192.168.199.21" }
      - { name: "okd-master-02", ip: "192.168.199.22" }
      - { name: "okd-master-03", ip: "192.168.199.23" }
  
  tasks:
    - name: ⏳ WAIT - Monitoring OKD Bootstrap Process
      ansible.builtin.command:
        cmd: "openshift-install wait-for bootstrap-complete --dir={{ install_dir }} --log-level=info"
      become: true
      register: bootstrap_result
      async: 3600
      poll: 30
      ignore_errors: true # Allow proceeding if bootstrap-complete was already reached manually

    - name: 🔄 HANDOFF - Transition Load Balancer to Masters
      ansible.builtin.blockinfile:
        path: /etc/haproxy/haproxy.cfg
        marker: "# {mark} OKD LOAD BALANCER CONFIG"
        block: |
          #---------------------------------------------------------------------
          # OKD API (6443) - MASTERS ONLY
          #---------------------------------------------------------------------
          frontend okd-api
              bind {{ lb_ip }}:6443
              mode tcp
              default_backend okd-api-backend

          backend okd-api-backend
              mode tcp
              balance roundrobin
              # server okd-bootstrap {{ bootstrap_ip }}:6443 check
              {% for node in masters %}
              server {{ node.name }} {{ node.ip }}:6443 check
              {% endfor %}

          #---------------------------------------------------------------------
          # OKD Machine Config Server (22623) - MASTERS ONLY
          #---------------------------------------------------------------------
          frontend okd-mcs
              bind {{ lb_ip }}:22623
              mode tcp
              default_backend okd-mcs-backend

          backend okd-mcs-backend
              mode tcp
              balance roundrobin
              # server okd-bootstrap {{ bootstrap_ip }}:22623 check
              {% for node in masters %}
              server {{ node.name }} {{ node.ip }}:22623 check
              {% endfor %}

          #---------------------------------------------------------------------
          # OKD Ingress (80/443) - Workers
          #---------------------------------------------------------------------
          frontend okd-http
              bind {{ lb_ip }}:80
              mode tcp
              default_backend okd-http-backend

          backend okd-http-backend
              mode tcp
              balance roundrobin
              server okd-worker-01 192.168.199.31:80 check
              server okd-worker-02 192.168.199.32:80 check
              server okd-worker-03 192.168.199.33:80 check

          frontend okd-https
              bind {{ lb_ip }}:443
              mode tcp
              default_backend okd-https-backend

          backend okd-https-backend
              mode tcp
              balance roundrobin
              server okd-worker-01 192.168.199.31:443 check
              server okd-worker-02 192.168.199.32:443 check
              server okd-worker-03 192.168.199.33:443 check
      become: true
      register: lb_handoff

    - name: 🔄 RESTART - Apply Production LB Config
      ansible.builtin.systemd:
        name: haproxy
        state: restarted
      become: true
      when: lb_handoff.changed

    - name: 🗑️ CLEANUP - Destroy Bootstrap VM on SMS-1
      ansible.builtin.shell: |
        virsh destroy okd-bootstrap || true
        virsh undefine okd-bootstrap --remove-all-storage || true
      delegate_to: sms-1
      become: true
      ignore_errors: true

    - name: 🚀 WAKE - Ensure OKD Worker Fleet is ON
      ansible.builtin.shell: |
        virsh start okd-worker-01 || true
        virsh start okd-worker-02 || true
        virsh start okd-worker-03 || true
      delegate_to: "{{ item }}"
      loop: ["nuc-1", "nuc-2", "nuc-3"]
      become: true

    - name: 📝 CSR - Automatically approve worker join requests
      ansible.builtin.shell: |
        export KUBECONFIG={{ install_dir }}/auth/kubeconfig
        # 1. Approve pending CSRs
        {% raw %}
        oc get csr -o go-template='{{range .items}}{{if not .status.certificate}}{{.metadata.name}}{{"\n"}}{{end}}{{end}}' | xargs -r oc adm certificate approve
        {% endraw %}
        # 2. Count ready nodes directly for the until condition
        oc get nodes --no-headers 2>/dev/null | grep -cw "Ready" || echo "0"
      become: true
      register: node_check
      until: node_check.stdout | int >= 6
      retries: 50
      delay: 30

    - name: 🚀 VERIFY - Final Node Status
      ansible.builtin.command:
        cmd: "oc get nodes --kubeconfig={{ install_dir }}/auth/kubeconfig"
      become: true
      register: final_nodes

    - name: 🔓 STATUS - 6-Node Fleet is Fully Operational
      ansible.builtin.debug:
        msg: "Handoff complete. All 6 nodes are Ready. Bootstrap node decommissioned."
