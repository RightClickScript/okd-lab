---
- name: Phase 4.0 - Nuclear Cleanup (All Hypervisors)
  hosts: hypervisors
  become: true
  gather_facts: false
  tasks:
    - name: 🔎 INFO - Identifying host
      ansible.builtin.debug:
        msg: "Cleaning up OKD VMs on {{ inventory_hostname }} ({{ ansible_host }})"

    - name: 🧹 CLEAN - Destroy and Undefine OKD VMs
      ansible.builtin.shell: |
        # Get list of VMs, filter for okd-, and wipe them
        vms=$(virsh list --all --name | grep 'okd-') || true
        for vm in $vms; do
          if [ -n "$vm" ]; then
            echo "Nuking $vm on {{ inventory_hostname }}..."
            virsh destroy "$vm" || true
            virsh undefine "$vm" --remove-all-storage || true
            rm -f "/var/lib/libvirt/images/$vm.ign" || true
          fi
        done
      changed_when: true

- name: Phase 4.1 - Generate and Patch OKD Ignition (lpt-1)
  hosts: local_spark
  become: true
  gather_facts: false

  vars:
    install_dir: "/opt/okd-cluster"
    distribution_root: "/mnt/data/distribution"

  tasks:
    - name: 🔐 SECRET - Load Pull Secret from Hub
      ansible.builtin.shell: "cat {{ distribution_root }}/secrets/pull_secret.json"
      register: pull_secret_content
      changed_when: false

    - name: 📌 SET - Define Pull Secret Fact
      ansible.builtin.set_fact:
        pull_secret: "{{ pull_secret_content.stdout | from_json | to_json }}"

    - name: 📁 PREP - Create Install Directory
      ansible.builtin.file:
        path: "{{ install_dir }}"
        state: directory
        mode: '0755'

    - name: 📦 TOOLS - Ensure exact OKD 4.19 Binaries exist on lpt-1
      ansible.builtin.shell: |
        if ! /usr/local/bin/openshift-install version | grep -q "4.19"; then
          rm -f /usr/local/bin/openshift-install /usr/local/bin/oc
          curl -L {{ artifacts.okd_install_url }} -o /tmp/install.tar.gz
          curl -L {{ artifacts.okd_client_url }} -o /tmp/client.tar.gz
          tar -xzf /tmp/install.tar.gz -C /usr/local/bin
          tar -xzf /tmp/client.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/openshift-install /usr/local/bin/oc
          rm -f /tmp/install.tar.gz /tmp/client.tar.gz
        fi
      changed_when: true

    - name: 📄 CONFIG - Generate install-config.yaml
      ansible.builtin.template:
        src: "../../templates/okd/install-config.yaml.j2"
        dest: "{{ install_dir }}/install-config.yaml"
        mode: "0644"

    - name: 🔥 IGNITION - Nuclear Wipe and Regenerate
      ansible.builtin.shell: |
        find {{ install_dir }} -mindepth 1 ! -name 'install-config.yaml' -delete
        /usr/local/bin/openshift-install create ignition-configs --dir={{ install_dir }}
      changed_when: true

    - name: 🛠️ PATCH - Inject Users, Hostnames, IPs, and Path Fixes (Ignition 3.2.0)
      ansible.builtin.shell: |
        cat <<EOF > /tmp/patch_ignition.py
        import json, base64, sys
        
        name = sys.argv[1]
        ip = sys.argv[2]
        role = sys.argv[3]
        file_path = f"{{ install_dir }}/{role}.ign"
        
        with open(file_path, 'r') as f:
            data = json.load(f)
        
        data["ignition"]["version"] = "3.2.0"

        # 1. SMART-UPDATE USERS
        pass_hash = "\$6\$2.AkBiINvK6sG1Xc\$4IpxnmmRZ0HhXgtndXgOIs7YYQ7cXdV.ub3Lmus3OBDJYqMi5HHzw/bGSlDUmGIFfTVjVB4.vIrNeeQPUrnKW1"
        ssh_key = "{{ ansible_ssh_public_key }}"
        
        if "passwd" not in data: data["passwd"] = {}
        if "users" not in data["passwd"]: data["passwd"]["users"] = []
        
        users = data["passwd"]["users"]
        
        # Add/Update bishop user
        bishop_user = next((u for u in users if u.get("name") == "bishop"), None)
        if not bishop_user:
            bishop_user = {"name": "bishop"}
            users.append(bishop_user)
        bishop_user["passwordHash"] = pass_hash
        bishop_user["sshAuthorizedKeys"] = [ssh_key]
        bishop_user["groups"] = ["sudo", "wheel"]

        # Update core user
        core_user = next((u for u in users if u.get("name") == "core"), None)
        if core_user:
            core_user["passwordHash"] = pass_hash
            core_user["sshAuthorizedKeys"] = [ssh_key]

        # 2. NETWORK CONFIG (enp1s0)
        nm_config = f"""[connection]
        id=enp1s0
        type=ethernet
        interface-name=enp1s0
        [ipv4]
        address1={ip}/24,{{ network.mgmt_gateway }}
        dns=192.168.199.10;
        dns-search={{ network.search_domains[0] }};
        method=manual
        """
        
        # 3. STORAGE
        hosts_config = f"127.0.0.1   localhost localhost.localdomain\n::1         localhost localhost.localdomain\n192.168.199.60 api-int.okd.homelab.local api.okd.homelab.local\n"
        if "storage" not in data: data["storage"] = {}
        if "files" not in data["storage"]: data["storage"]["files"] = []
        
        data["storage"]["files"].append({
            "path": "/etc/hostname",
            "mode": 420, "overwrite": True,
            "contents": { "source": "data:text/plain;charset=utf-8;base64," + base64.b64encode(f"{name}.homelab.local\n".encode()).decode() }
        })
        data["storage"]["files"].append({
            "path": "/etc/hosts",
            "mode": 420, "overwrite": True,
            "contents": { "source": "data:text/plain;charset=utf-8;base64," + base64.b64encode(hosts_config.encode()).decode() }
        })
        data["storage"]["files"].append({
            "path": "/etc/NetworkManager/system-connections/enp1s0.nmconnection",
            "mode": 384, "overwrite": True,
            "contents": { "source": "data:text/plain;charset=utf-8;base64," + base64.b64encode(nm_config.encode()).decode() }
        })
        data["storage"]["files"].append({
            "path": "/etc/selinux/config",
            "mode": 420, "overwrite": True,
            "contents": { "source": "data:text/plain;charset=utf-8;base64," + base64.b64encode("SELINUX=permissive\nSELINUXTYPE=targeted\n".encode()).decode() }
        })

        # 4. BOOTSTRAP ONLY FIXES
        if role == "bootstrap":
            if "systemd" not in data: data["systemd"] = {}
            if "units" not in data["systemd"]: data["systemd"]["units"] = []
            link_unit = {
                "name": "manifest-link.service", "enabled": True,
                "contents": "[Unit]\nDescription=OKD Manifest Linker\nBefore=kubelet.service\n\n[Service]\nType=oneshot\nExecStart=/usr/bin/bash -c 'mkdir -p /etc/kubernetes/manifests && ln -sf /opt/openshift/etcd-bootstrap/etc-kubernetes/manifests/*.yaml /etc/kubernetes/manifests/'\nRemainAfterExit=true\n\n[Install]\nWantedBy=multi-user.target\n"
            }
            data["systemd"]["units"].append(link_unit)
        
        with open(f"{{ install_dir }}/{name}.ign", 'w') as f:
            json.dump(data, f)
        EOF
        
        # Patch Masters
        {% for vm in okd_vms.masters %}
        python3 /tmp/patch_ignition.py {{ vm.name }} {{ vm.ip }} {{ 'bootstrap' if 'bootstrap' in vm.name else 'master' }}
        {% endfor %}
        # Patch Workers
        {% for vm in okd_vms.workers %}
        python3 /tmp/patch_ignition.py {{ vm.name }} {{ vm.ip }} worker
        {% endfor %}
      changed_when: true

    - name: ✅ VALIDATE - Ensure Patched Ignition is Valid
      ansible.builtin.shell: |
        cat {{ install_dir }}/{{ item.name }}.ign | docker run --rm -i quay.io/coreos/ignition-validate:release -
      loop: "{{ okd_vms.masters + okd_vms.workers }}"
      changed_when: false

    - name: 📤 PUBLISH - Move Patched Ignition to Distro Hub
      ansible.builtin.copy:
        src: "{{ install_dir }}/{{ item.name }}.ign"
        dest: "{{ distribution_root }}/ign/{{ item.name }}.ign"
        remote_src: true
        mode: "0644"
      loop: "{{ okd_vms.masters + okd_vms.workers }}"

- name: Phase 4.2 - Provision OKD VMs (Masters & Workers)
  hosts: hypervisors
  become: true
  gather_facts: false

  vars:
    vm_root: "/mnt/data/vms"
    base_image: "{{ vm_root }}/scos-base.qcow2"

  tasks:
    - name: 💿 BASE - Ensure SCOS 9 QCOW2 exists
      ansible.builtin.get_url:
        url: "{{ artifacts.scos_qcow2_url }}"
        dest: "{{ base_image }}.gz"
        mode: "0644"

    - name: 📦 EXTRACT - Decompress Base Image
      ansible.builtin.shell: |
        gunzip -c {{ base_image }}.gz > {{ base_image }}
        chown libvirt-qemu:kvm {{ base_image }}
        chmod 0660 {{ base_image }}
      args:
        creates: "{{ base_image }}"

    - name: 🏗️ VM - Create Clones and Start OKD VMs
      ansible.builtin.shell: |
        # 1. Final Cleanup (Triple Safety)
        virsh destroy {{ item.name }} || true
        virsh undefine {{ item.name }} --remove-all-storage || true
        
        # 2. Create and Permission the disk
        qemu-img create -f qcow2 -F qcow2 -b {{ base_image }} {{ vm_root }}/{{ item.name }}.qcow2 {{ item.disk | default(100) }}G
        chown libvirt-qemu:kvm {{ vm_root }}/{{ item.name }}.qcow2
        chmod 0660 {{ vm_root }}/{{ item.name }}.qcow2

        # 3. Download ignition to safe path
        curl -o /var/lib/libvirt/images/{{ item.name }}.ign http://192.168.199.5:8080/ign/{{ item.name }}.ign
        chown libvirt-qemu:kvm /var/lib/libvirt/images/{{ item.name }}.ign
        chmod 0644 /var/lib/libvirt/images/{{ item.name }}.ign
        
        # 4. Launch the VM
        virt-install \
          --name {{ item.name }} \
          --ram {{ item.ram }} \
          --vcpus {{ item.cpu }} \
          --os-variant fedora-coreos-stable \
          --disk path={{ vm_root }}/{{ item.name }}.qcow2,bus=virtio \
          --memballoon model=virtio \
          --import \
          --network bridge=br0,model=virtio \
          --graphics vnc,listen=0.0.0.0 \
          --noautoconsole \
          --wait 0 \
          --events on_poweroff=restart,on_reboot=restart,on_crash=restart \
          --qemu-commandline="-fw_cfg name=opt/com.coreos/config,file=/var/lib/libvirt/images/{{ item.name }}.ign"
      when: item.host == inventory_hostname
      loop: "{{ okd_vms.masters + okd_vms.workers }}"
      args:
        creates: "/etc/libvirt/qemu/{{ item.name }}.xml"

    - name: ⚡ AUTOSTART - Enable VM Persistence
      ansible.builtin.shell: "virsh autostart {{ item.name }}"
      when: item.host == inventory_hostname
      loop: "{{ okd_vms.masters + okd_vms.workers }}"
      ignore_errors: true

    - name: 🔓 STATUS - Deployment Complete
      ansible.builtin.debug:
        msg: "Full Fleet initialized. Nuclear Cleanup confirmed on {{ inventory_hostname }}."
