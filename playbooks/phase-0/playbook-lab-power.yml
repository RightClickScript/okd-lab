---
- name: Phase 0.4 - Lab Power Control (Shutdown)
  hosts: physical
  become: true
  gather_facts: false
  tasks:
    - name: 🛑 SHUTDOWN - Power off NUCs and SMS-1
      community.general.shutdown:
      when: type in ['nuc', 'sms']
      tags: [power_off, never]

- name: Phase 0.4 - Lab Power Control (Power On)
  hosts: local_spark
  gather_facts: false
  vars:
    # Query only hosts in the physical group that have a MAC defined
    power_on_targets: "{{ groups['physical'] }}"
  
  tasks:
    - name: ⚡ WAKE - Send WoL to SMS-1 first
      ansible.builtin.command: "wakeonlan {{ hostvars[item].mac }}"
      loop: "{{ power_on_targets }}"
      when: 
        - hostvars[item].type == 'sms'
        - hostvars[item].mac is defined
      tags: [power_on, never]

    - name: ⏳ WAIT - Allow SMS-1 to initialize (2 mins)
      ansible.builtin.pause:
        seconds: 120
      tags: [power_on, never]

    - name: ⚡ WAKE - Send WoL to NUC cluster
      ansible.builtin.command: "wakeonlan {{ hostvars[item].mac }}"
      loop: "{{ power_on_targets }}"
      loop_control:
        pause: 10 # Short pause between NUC packets
      when: 
        - hostvars[item].type == 'nuc'
        - hostvars[item].mac is defined
      tags: [power_on, never]

    - name: 🔓 STATUS - Power signals sent
      ansible.builtin.debug:
        msg: "Wake-on-LAN packets dispatched from lpt-1 to SMS-1 and NUCs."
      tags: [power_on, never]
