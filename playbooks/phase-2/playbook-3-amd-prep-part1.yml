---
- name: Phase 2.1 - AMD Epyc Hypervisor Foundations (Non-Networking)
  hosts: management_plane
  become: true
  gather_facts: true

  tasks:
    - name: 🛑 SANITIZATION - Remove LXD/LXC
      block:
        - name: Gather service facts
          ansible.builtin.service_facts:

        - name: Stop and disable LXD/LXC services
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: stopped
            enabled: false
          loop: [lxd.service, lxd-agent.service, lxcfs.service]
          when: "ansible_facts.services[item] is defined"
          ignore_errors: true

        - name: Purge LXD/LXC Artifacts
          ansible.builtin.apt:
            name: ["lxd", "lxd-client", "lxc", "lxcfs"]
            state: absent
            purge: true

    - name: 📦 DEPENDENCIES - Install KVM, Libvirt & Cockpit UI
      ansible.builtin.apt:
        name: 
          - qemu-kvm
          - libvirt-daemon-system
          - libvirt-clients
          - bridge-utils
          - virtinst
          - virt-manager
          - ovmf
          - cockpit
          - cockpit-machines
          - genisoimage
          - python3-libvirt
          - python3-lxml
          - python3-yaml
          - python3-pip
        state: present

    - name: 👥 ACCESS - Add bishop to libvirt group
      ansible.builtin.user:
        name: bishop
        groups: libvirt,kvm
        append: true

    - name: 🔓 STATUS - Success Message
      ansible.builtin.debug:
        msg: 
          - "SMS-1 is now prepared with Hypervisor tools and Cockpit."
          - "Cockpit UI: https://192.168.199.4:9090"
          - "Networking: Preserved from Phase 0 Standard (br0, br198)."
