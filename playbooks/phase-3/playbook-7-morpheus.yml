---
- name: Phase 3-2a - Deploy Morpheus Appliance VM (HTTP Injection)
  hosts: management_plane
  become: true
  gather_facts: false

  vars:
    # ISO Details - Using Local Hub (Updated to 24.04.2)
    iso_url: "http://192.168.199.5:8080/iso/ubuntu-24.04.2-live-server-amd64.iso"
    iso_root: "/mnt/data/vms"
    ubuntu_iso: "{{ iso_root }}/ubuntu-24.04.2-live-server-amd64.iso"
    vm_name: "{{ morpheusdetails.name }}"
    vm_disk: "{{ iso_root }}/{{ vm_name }}.qcow2"
    # HTTP Data Source (Container Host)
    http_server: "192.168.199.5:8080"
    distribution_root: "/mnt/data/distribution" # Aligned with Nginx root

  tasks:
    - name: 📂 HTTP - Setup Directory on Container Host (lpt-1)
      ansible.builtin.file:
        path: "{{ distribution_root }}/morpheus"
        state: directory
        mode: '0755'
        owner: 1001
        group: 1001
      delegate_to: lpt-1

    - name: 📄 AUTOINSTALL - Generate user-data (On lpt-1)
      ansible.builtin.copy:
        dest: "{{ distribution_root }}/morpheus/user-data"
        content: |
          #cloud-config
          autoinstall:
            version: 1
            locale: en_US.UTF-8
            keyboard:
              layout: us
            network:
              network:
                version: 2
                ethernets:
                  enp1s0:
                    dhcp4: no
                    addresses:
                      - {{ morpheusdetails.IPAddress }}/24
                    gateway4: 192.168.199.254
                    nameservers:
                      addresses: [192.168.199.10, 8.8.8.8]
                      search: [{{ ad.domain_FQDN }}]
            identity:
              hostname: {{ vm_name }}
              username: bishop
              password: "{{ ansible_password | password_hash('sha512') }}"
            ssh:
              install-server: true
              allow-pw: true
              authorized-keys:
                - "{{ ansible_ssh_public_key }}"
            storage:
              layout:
                name: direct
            late-commands:
              - echo 'bishop ALL=(ALL) NOPASSWD:ALL' > /target/etc/sudoers.d/bishop
              - curtin in-target --target=/target -- chmod 440 /etc/sudoers.d/bishop
            timezone: US/Eastern
      delegate_to: lpt-1

    - name: 📄 AUTOINSTALL - Generate empty meta-data (On lpt-1)
      ansible.builtin.copy:
        dest: "{{ distribution_root }}/morpheus/meta-data"
        content: ""
      delegate_to: lpt-1

    - name: 📦 PREREQ - Download Ubuntu Server ISO to SMS-1
      ansible.builtin.get_url:
        url: "{{ iso_url }}"
        dest: "{{ ubuntu_iso }}"
        mode: "0644"
        force: false

    - name: 💿 DISK - Create QCOW2 Disk in ZFS Datapool
      ansible.builtin.command:
        cmd: "qemu-img create -f qcow2 {{ vm_disk }} {{ morpheusdetails.BootDiskSize }}G"
        creates: "{{ vm_disk }}"

    - name: 🏗️ VM - Define and Start Morpheus VM (Bridged to br0)
      ansible.builtin.shell: |
        virt-install \
          --name {{ vm_name }} \
          --ram {{ morpheusdetails.Memory }} \
          --vcpus {{ morpheusdetails.CPU }} \
          --os-variant ubuntu22.04 \
          --location {{ ubuntu_iso }},kernel=casper/vmlinuz,initrd=casper/initrd \
          --disk path={{ vm_disk }},format=qcow2,bus=virtio \
          --network bridge=br0,model=virtio \
          --graphics vnc,listen=0.0.0.0 \
          --noautoconsole \
          --wait -1 \
          --extra-args "autoinstall ds=nocloud-net;s=http://{{ http_server }}/morpheus/"
      args:
        creates: "/etc/libvirt/qemu/{{ vm_name }}.xml"

    - name: 🔄 REBOOT - Start VM after installation
      ansible.builtin.shell: "virsh start {{ vm_name }}"
      register: vm_start
      failed_when: vm_start.rc != 0 and 'already active' not in vm_start.stderr

    - name: ⚡ AUTOSTART - Enable VM autostart
      ansible.builtin.shell: "virsh autostart {{ vm_name }}"

- name: Phase 3-2b - Install Morpheus Appliance
  hosts: morpheus
  become: true
  gather_facts: false

  tasks:
    - name: ⏳ WAIT - Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        timeout: 1200

    - name: 🏗️ INSTALL - Install Morpheus Package Directly from Hub
      ansible.builtin.apt:
        deb: "http://192.168.199.5:8080/bin/morpheus-appliance.deb"
        state: present

    - name: ⚙️ CONFIG - Reconfigure Morpheus (Initial)
      ansible.builtin.command: morpheus-ctl reconfigure
      register: reconfigure_output
      changed_when: "'reconfigure: success' in reconfigure_output.stdout"

    - name: 🔓 STATUS - Morpheus is Ready
      ansible.builtin.debug:
        msg: "Morpheus Appliance is installed and reconfigured. Access it at https://{{ morpheusdetails.IPAddress }}"
