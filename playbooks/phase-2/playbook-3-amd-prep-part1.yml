---
- name: Phase 2.1 - AMD Epyc Sanitization & Tools
  hosts: management_plane
  become: true
  gather_facts: false

  tasks:
    - name: 🧹 SANITIZE - Remove unnecessary container engines
      ansible.builtin.apt:
        name:
          - docker.io
          - containerd
          - runc
        state: absent
        purge: true

    - name: 🧹 CLEANUP - Remove dangling dependencies
      ansible.builtin.apt:
        autoremove: true
        purge: true

    - name: 🏗️ TOOLS - Install Essential Admin Tools
      ansible.builtin.apt:
        name:
          - git
          - curl
          - htop
          - jq
          - unzip
          - psmisc
          - net-tools
          - socat
        state: present
        update_cache: true

    - name: 🔓 STATUS - AMD Prep Part 1 Complete
      ansible.builtin.debug:
        msg: "Hypervisor sanitized (Docker/Containerd removed) and admin tools installed."
