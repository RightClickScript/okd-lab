---
- name: Lab Power Control - Global Management
  hosts: localhost
  gather_facts: false

  vars:
    # Action passed from Semaphore or CLI (shutdown/startup)
    power_action: "{{ action | default('shutdown') }}"

  tasks:
    # --- SHUTDOWN SEQUENCE ---
    - name: 🌙 SHUTDOWN - Graceful Lab Power Down
      when: power_action == "shutdown"
      block:
        - name: 🛠️ WORKERS - Shutting down physical NUCs
          ansible.builtin.shell: "ssh -o StrictHostKeyChecking=no {{ item }} 'sudo shutdown -h now'"
          loop: ["192.168.199.1", "192.168.199.2", "192.168.199.3"]
          ignore_errors: true
          delegate_to: lpt-1

        - name: 🛠️ GUESTS - Shutting down all VMs on SMS-1
          ansible.builtin.shell: "virsh shutdown {{ item }}"
          loop: ["okd-master-01", "okd-master-02", "okd-master-03", "identity-01", "morpheus-01"]
          delegate_to: sms-1
          become: true
          ignore_errors: true

        - name: ⏳ WAIT - Giving VMs 60 seconds to stop
          ansible.builtin.pause:
            seconds: 60

        - name: 🛠️ HYPERVISOR - Shutting down physical SMS-1
          ansible.builtin.shell: "sudo shutdown -h now"
          delegate_to: sms-1
          ignore_errors: true

        - name: 🔓 STATUS - Shutdown complete
          ansible.builtin.debug:
            msg: "Lab is dark. NUCs, VMs, and SMS-1 are powered down. lpt-1 remains active."

    # --- STARTUP SEQUENCE ---
    - name: ☀️ STARTUP - Graceful Lab Wake-Up
      when: power_action == "startup"
      block:
        - name: 🛠️ HYPERVISOR - Waking up physical SMS-1 (Wake-on-LAN)
          community.general.wakeonlan:
            mac: "5e:dc:07:8f:3e:01"
            broadcast: 192.168.199.255
          delegate_to: lpt-1

        - name: ⏳ WAIT - Giving SMS-1 time to boot (3 minutes)
          ansible.builtin.pause:
            minutes: 3

        - name: 🛠️ IDENTITY - Starting Windows DC (DNS First)
          ansible.builtin.shell: "virsh start identity-01"
          delegate_to: sms-1
          become: true

        - name: ⏳ WAIT - Giving DNS 60 seconds to stabilize
          ansible.builtin.pause:
            seconds: 60

        - name: 🛠️ MASTERS - Starting OKD Control Plane
          ansible.builtin.shell: "virsh start {{ item }}"
          loop: ["okd-master-01", "okd-master-02", "okd-master-03", "morpheus-01"]
          delegate_to: sms-1
          become: true

        - name: 🛠️ WORKERS - Waking up physical NUCs (Wake-on-LAN)
          community.general.wakeonlan:
            mac: "{{ hostvars[item]['mac'] }}"
            broadcast: 192.168.199.255
          loop: ["nuc-1", "nuc-2", "nuc-3"]
          delegate_to: lpt-1

        - name: 🔓 STATUS - Startup complete
          ansible.builtin.debug:
            msg: "Lab is waking up. SMS-1 is up, VMs are starting, and NUCs have been signaled."
