---
- name: Phase 0.5 - OKD Graceful Cluster Shutdown
  hosts: local_spark
  become: true
  gather_facts: false

  vars:
    install_dir: "/opt/okd-cluster"
    kubeconfig: "/opt/okd-cluster/auth/kubeconfig"

  tasks:
    - name: 🛑 NESTED VMS - Stop all KubeVirt VMs
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        # Iterate over all virtual machines in all namespaces and set running to false
        for vm in $(oc get virtualmachine -A -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}'); do
          namespace=$(echo $vm | awk '{print $1}')
          name=$(echo $vm | awk '{print $2}')
          echo "Stopping VM $name in namespace $namespace"
          oc patch virtualmachine $name -n $namespace --type merge -p '{"spec":{"running":false}}' || true
        done
      changed_when: true
      ignore_errors: true

    - name: 🔐 BACKUP - Take ETCD Snapshot (Pre-Shutdown Safety)
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        oc debug node/okd-master-01.homelab.local -- chroot /host /usr/local/bin/cluster-backup.sh /home/core/assets/backup
      ignore_errors: true

    - name: 🚧 CORDON - Mark all nodes as unschedulable
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        for node in $(oc get nodes -o jsonpath='{.items[*].metadata.name}'); do
          oc adm cordon ${node}
        done
      changed_when: true

    - name: 🧹 DRAIN - Evacuate pods from Worker nodes
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        for node in $(oc get nodes -l node-role.kubernetes.io/worker -o jsonpath='{.items[*].metadata.name}'); do
          oc adm drain ${node} --delete-emptydir-data --ignore-daemonsets=true --timeout=180s --force
        done
      changed_when: true
      ignore_errors: true

    - name: 💤 SHUTDOWN - Signal VM OS Shutdown (Delayed 1m)
      ansible.builtin.shell: |
        export KUBECONFIG={{ kubeconfig }}
        # Shut down workers first
        for node in $(oc get nodes -l node-role.kubernetes.io/worker -o jsonpath='{.items[*].metadata.name}'); do
          oc debug node/${node} -- chroot /host shutdown -h 1 &
        done
        sleep 10
        # Shut down masters last
        for node in $(oc get nodes -l node-role.kubernetes.io/master -o jsonpath='{.items[*].metadata.name}'); do
          oc debug node/${node} -- chroot /host shutdown -h 1 &
        done
      changed_when: true

- name: Phase 0.5b - Hypervisor Verification & Core VM Shutdown
  hosts: hypervisors
  become: true
  gather_facts: false
  tasks:
    - name: ⏳ WAIT - Allow 5 minutes for graceful OKD VM stop
      ansible.builtin.wait_for:
        timeout: 300
      delegate_to: localhost
      become: false
      run_once: true

    - name: 🗡️ FORCE - Kill any lingering OKD VMs
      ansible.builtin.shell: |
        for vm in $(virsh list --name | grep 'okd-'); do
          if [ -n "$vm" ]; then
            echo "Graceful stop failed. Force-killing $vm..."
            virsh destroy "$vm" || true
          fi
        done
      changed_when: true

    - name: 💤 CORE VMS - Gracefully shutdown AD and Morpheus
      ansible.builtin.shell: |
        virsh shutdown identity-01 || true
        virsh shutdown morpheus-01 || true
      when: inventory_hostname == 'sms-1'
      changed_when: true

    - name: ⏳ WAIT - Wait up to 5 minutes for Core VMs to shut down
      ansible.builtin.shell: |
        for i in {1..30}; do
          running=$(virsh list --name | grep -E '^identity-01$|^morpheus-01$' | wc -l)
          if [ "$running" -eq 0 ]; then
            exit 0
          fi
          sleep 10
        done
        exit 1
      when: inventory_hostname == 'sms-1'
      register: core_vm_wait
      ignore_errors: true
      changed_when: false

    - name: 🗡️ FORCE - Kill lingering Core VMs (If graceful failed)
      ansible.builtin.shell: |
        virsh destroy identity-01 || true
        virsh destroy morpheus-01 || true
      when: 
        - inventory_hostname == 'sms-1'
        - core_vm_wait.rc != 0
      changed_when: true

- name: Phase 0.5c - Physical Host Shutdown
  hosts: physical
  become: true
  gather_facts: false
  tasks:
    - name: 🛑 POWER OFF - Shut down NUCs and SMS-1
      community.general.shutdown:
      when: type in ['nuc', 'sms']
