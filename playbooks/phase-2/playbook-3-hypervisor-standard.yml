---
- name: Phase 2.1 - Unified Hypervisor Standardization (SMS-1 & NUCs)
  hosts: hypervisors
  become: true
  gather_facts: false

  vars:
    # 8GB in bytes (8 * 1024 * 1024 * 1024)
    zfs_arc_max_bytes: 8589934592
    storage_pool_path: "/mnt/data/vms"
    storage_pool_name: "datapool"

  tasks:
    - name: 🧹 SANITIZE - Remove unnecessary container engines
      ansible.builtin.apt:
        name: [docker.io, containerd, runc]
        state: absent
        purge: true

    - name: 🏗️ TOOLS - Install Essential Stack
      ansible.builtin.apt:
        name:
          - git
          - curl
          - htop
          - jq
          - unzip
          - psmisc
          - net-tools
          - socat
          - genisoimage
          - python3-passlib
          - qemu-kvm
          - libvirt-daemon-system
          - libvirt-clients
          - bridge-utils
          - virtinst
          - virt-manager
          - ovmf
          - cockpit
          - cockpit-machines
          - zfsutils-linux
          - python3-lxml
        state: present
        update_cache: true

    - name: 👥 ACCESS - Add bishop to libvirt group
      ansible.builtin.user:
        name: bishop
        groups: libvirt,kvm
        append: true

    - name: 🔑 ACCESS - Distribute SSH Public Key
      ansible.posix.authorized_key:
        user: bishop
        state: present
        key: "{{ ansible_ssh_public_key }}"

    - name: 🧠 TUNING - Cap ZFS ARC to 8GB
      block:
        - name: Write ZFS module configuration
          ansible.builtin.copy:
            dest: /etc/modprobe.d/zfs.conf
            content: "options zfs zfs_arc_max={{ zfs_arc_max_bytes }}\n"
            mode: '0644'

        - name: Apply ZFS ARC limit live
          ansible.builtin.shell: "echo {{ zfs_arc_max_bytes }} > /sys/module/zfs/parameters/zfs_arc_max"
          changed_when: true
      ignore_errors: true

    - name: 🧠 RECLAIM - Restart Cockpit to release memory
      ansible.builtin.shell: |
        systemctl stop cockpit.socket cockpit.service
        killall cockpit-bridge || true
        systemctl start cockpit.socket
      changed_when: true

    - name: 📁 STORAGE - Initialize ZFS Datapool
      block:
        - name: Check if ZFS pool exists
          ansible.builtin.shell: "zpool list {{ storage_pool_name }}"
          register: zpool_check
          ignore_errors: true
          changed_when: false

        - name: Create ZFS Datapool on Data Disk
          ansible.builtin.command: "zpool create {{ storage_pool_name }} {{ data_disk }} -m /mnt/data"
          when: 
            - zpool_check.rc != 0
            - data_disk is defined
          changed_when: true

        - name: Create VM Storage Dataset
          community.general.zfs:
            name: "{{ storage_pool_name }}/vms"
            state: present
            extra_zfs_properties:
              mountpoint: "{{ storage_pool_path }}"

    - name: 📁 STORAGE - Configure Libvirt Storage Pool
      block:
        - name: Ensure storage directory exists
          ansible.builtin.file:
            path: "{{ storage_pool_path }}"
            state: directory
            owner: root
            group: root
            mode: "0755"

        - name: Define Libvirt Storage Pool
          community.libvirt.virt_pool:
            command: define
            name: "{{ storage_pool_name }}"
            xml: |
              <pool type='dir'>
                <name>{{ storage_pool_name }}</name>
                <target>
                  <path>{{ storage_pool_path }}</path>
                </target>
              </pool>

        - name: Start and Autostart Storage Pool
          community.libvirt.virt_pool:
            name: "{{ storage_pool_name }}"
            state: active
            autostart: true

    - name: 🌐 NETWORKING - Link Libvirt to br0 Bridge
      ansible.builtin.shell: |
        virsh net-destroy br0 || true
        virsh net-undefine br0 || true
        virsh net-define /dev/stdin <<EOF
        <network>
          <name>br0</name>
          <forward mode='bridge'/>
          <bridge name='br0'/>
        </network>
        EOF
        virsh net-start br0
        virsh net-autostart br0
      args:
        executable: /bin/bash
      changed_when: true

    - name: 🔒 SECURITY - Disable AppArmor confinement for Libvirt
      ansible.builtin.lineinfile:
        path: /etc/libvirt/qemu.conf
        regexp: '^#?security_driver ='
        line: 'security_driver = "none"'
        state: present
      register: qemu_conf

    - name: 🔄 SECURITY - Restart Libvirt to apply security changes
      ansible.builtin.systemd:
        name: libvirtd
        state: restarted
      when: qemu_conf.changed

    - name: 🔓 STATUS - Hypervisor Standardization Complete
      ansible.builtin.debug:
        msg: "Host {{ inventory_hostname }} is standardized with ZFS storage and KVM networking."
