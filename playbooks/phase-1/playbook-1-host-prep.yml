---
- name: Phase 1-1 - Consolidated Container Host Prep (Laptop)
  hosts: local_spark
  become: true
  gather_facts: true

  tasks:
    - name: 🛑 SANITIZATION - Remove LXD/LXC
      block:
        - name: Gather service facts
          ansible.builtin.service_facts:

        - name: Stop and disable LXD/LXC services
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: stopped
            enabled: false
          loop: [lxd.service, lxd-agent.service, lxcfs.service]
          when: "ansible_facts.services[item] is defined"
          ignore_errors: true

        - name: Purge LXD/LXC Artifacts
          ansible.builtin.apt:
            name: ["lxd", "lxd-client", "lxc", "lxcfs"]
            state: absent
            purge: true

    - name: 🛠️ KERNEL - Configure Modules and Sysctl
      block:
        - name: Create k8s.conf for module loading
          ansible.builtin.copy:
            dest: /etc/modules-load.d/k8s.conf
            content: |
              overlay
              br_netfilter
            mode: '0644'

        - name: Load modules immediately
          community.general.modprobe:
            name: "{{ item }}"
            state: present
          loop: [overlay, br_netfilter]

        - name: Create 99-kubernetes-k8s.conf for sysctl
          ansible.builtin.copy:
            dest: /etc/sysctl.d/99-kubernetes-k8s.conf
            content: |
              net.bridge.bridge-nf-call-ip6tables = 1
              net.bridge.bridge-nf-call-iptables = 1
              net.ipv4.ip_forward = 1
              net.ipv4.ip_nonlocal_bind = 1
            mode: '0644'

        - name: Apply sysctl changes
          ansible.builtin.command: sysctl --system
          changed_when: true

    - name: 📦 SOFTWARE - Install Docker, Helm, and K3s
      block:
        - name: Install dependencies
          ansible.builtin.apt:
            name: [curl, wakeonlan, docker.io, python3-pip, python3-kubernetes, python3-yaml, ansible, genisoimage, python3-passlib]
            state: present

        - name: Install Helm Binary
          ansible.builtin.shell: |
            curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          args:
            creates: /usr/local/bin/helm

        - name: Install K3s (Local Factory)
          ansible.builtin.shell: |
            curl -sfL https://get.k3s.io | sh -s - \
              --write-kubeconfig-mode 644 \
              --disable traefik \
              --disable servicelb \
              --node-ip {{ ansible_host }} \
              --flannel-iface br0
          args:
            creates: /usr/local/bin/k3s

        - name: 📦 ANSIBLE - Install Required Collections on Host
          community.general.ansible_galaxy_install:
            type: collection
            name: "{{ item }}"
          loop:
            - community.general
            - ansible.posix
            - community.docker
            - community.libvirt
            - kubernetes.core
            - ansible.windows
            - microsoft.ad
            - community.windows

    - name: 📁 STRUCTURE - Create Persistence Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0777'
        owner: 1001
        group: 1001
      loop:
        - /mnt/data/distribution
        - /mnt/data/semaphore/postgres
        - /mnt/data/semaphore/data
        - /mnt/data/semaphore/config

    - name: 💻 ENVIRONMENT - Configure .bashrc
      ansible.builtin.blockinfile:
        path: "/home/bishop/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - INFRA FACTORY"
        block: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          cd /home/bishop/ansible || true
