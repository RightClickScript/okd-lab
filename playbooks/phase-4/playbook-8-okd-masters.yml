---
- name: Phase 4.1 - Generate and Patch OKD Ignition (lpt-1)
  hosts: local_spark
  become: true
  gather_facts: false

  vars:
    install_dir: "/opt/okd-cluster"
    distribution_root: "/mnt/data/distribution"

  tasks:
    - name: 🔐 SECRET - Load Pull Secret from Hub
      ansible.builtin.shell: "cat {{ distribution_root }}/secrets/pull_secret.json"
      register: pull_secret_content
      changed_when: false

    - name: 📌 SET - Define Pull Secret Fact
      ansible.builtin.set_fact:
        pull_secret: "{{ pull_secret_content.stdout | from_json | to_json }}"

    - name: 📁 PREP - Create Install Directory
      ansible.builtin.file:
        path: "{{ install_dir }}"
        state: directory
        mode: '0755'

    - name: 📦 TOOLS - Ensure exact OKD 4.19 Binaries exist on lpt-1
      ansible.builtin.shell: |
        if ! /usr/local/bin/openshift-install version | grep -q "4.19"; then
          rm -f /usr/local/bin/openshift-install /usr/local/bin/oc
          curl -L {{ artifacts.okd_install_url }} -o /tmp/install.tar.gz
          curl -L {{ artifacts.okd_client_url }} -o /tmp/client.tar.gz
          tar -xzf /tmp/install.tar.gz -C /usr/local/bin
          tar -xzf /tmp/client.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/openshift-install /usr/local/bin/oc
          rm -f /tmp/install.tar.gz /tmp/client.tar.gz
        fi
      changed_when: true

    - name: 📄 CONFIG - Generate install-config.yaml
      ansible.builtin.template:
        src: "../../templates/okd/install-config.yaml.j2"
        dest: "{{ install_dir }}/install-config.yaml"
        mode: "0644"

    - name: 🔥 IGNITION - Generate Cluster Ignition Files
      ansible.builtin.shell: |
        rm -rf {{ install_dir }}/*.ign {{ install_dir }}/auth {{ install_dir }}/metadata.json
        openshift-install create ignition-configs --dir={{ install_dir }}
      changed_when: true

    - name: 🛠️ PATCH - Inject Static IPs, SELinux, and Path Fixes (Ignition 3.2.0)
      ansible.builtin.shell: |
        cat <<EOF > /tmp/patch_ignition.py
        import json, base64, sys
        
        name = sys.argv[1]
        ip = sys.argv[2]
        role = sys.argv[3]
        file_path = f"{{ install_dir }}/{role}.ign"
        
        with open(file_path, 'r') as f:
            data = json.load(f)
        
        # 0. VERSION ALIGNMENT
        data["ignition"]["version"] = "3.2.0"

        # 1. SMART-UPDATE CORE USER
        pass_hash = "\$6\$2.AkBiINvK6sG1Xc\$4IpxnmmRZ0HhXgtndXgOIs7YYQ7cXdV.ub3Lmus3OBDJYqMi5HHzw/bGSlDUmGIFfTVjVB4.vIrNeeQPUrnKW1"
        users = data.get("passwd", {}).get("users", [])
        core_user = next((u for u in users if u.get("name") == "core"), None)
        if core_user:
            core_user["passwordHash"] = pass_hash
        else:
            if "passwd" not in data: data["passwd"] = {}
            if "users" not in data["passwd"]: data["passwd"]["users"] = []
            data["passwd"]["users"].append({"name": "core", "passwordHash": pass_hash})

        # 2. NETWORK CONFIG
        nm_config = f"""[connection]
        id=enp1s0
        type=ethernet
        interface-name=enp1s0
        
        [ipv4]
        address1={ip}/24,{{ network.mgmt_gateway }}
        dns=192.168.199.10;
        dns-search={{ network.search_domains[0] }};
        method=manual
        """
        
        # 3. SELF-HEALING & MANIFEST JUMPSTART (Bootstrap Only)
        if role == "bootstrap":
            if "systemd" not in data: data["systemd"] = {}
            if "units" not in data["systemd"]: data["systemd"]["units"] = []
            
            # Fix node-image-pull failure
            pull_dropin = {"name": "10-ignore-failure.conf", "contents": "[Service]\nExecStart=\nExecStart=/usr/bin/bash -c '/usr/local/bin/node-image-pull.sh || true'\n"}
            data["systemd"]["units"].append({"name": "node-image-pull.service", "dropins": [pull_dropin]})

            # Fix node-image-finish failure
            finish_dropin = {"name": "10-ignore-failure.conf", "contents": "[Service]\nSuccessExitStatus=1\n"}
            data["systemd"]["units"].append({"name": "node-image-finish.service", "dropins": [finish_dropin]})

            # AUTO-LINK MANIFESTS (The fix for the missing Etcd/API pods)
            link_unit = {
                "name": "manifest-link.service",
                "enabled": True,
                "contents": "[Unit]\nDescription=OKD Manifest Compatibility Linker\nBefore=kubelet.service\n\n[Service]\nType=oneshot\nExecStart=/usr/bin/bash -c 'mkdir -p /etc/kubernetes/manifests && ln -sf /opt/openshift/etcd-bootstrap/etc-kubernetes/manifests/*.yaml /etc/kubernetes/manifests/'\nRemainAfterExit=true\n\n[Install]\nWantedBy=multi-user.target\n"
            }
            data["systemd"]["units"].append(link_unit)

        # 4. STORAGE (Network + SELinux Config)
        if "storage" not in data: data["storage"] = {}
        if "files" not in data["storage"]: data["storage"]["files"] = []
        
        data["storage"]["files"].append({
            "path": "/etc/NetworkManager/system-connections/enp1s0.nmconnection",
            "mode": 384, "overwrite": True,
            "contents": { "source": "data:text/plain;charset=utf-8;base64," + base64.b64encode(nm_config.encode()).decode() }
        })
        
        data["storage"]["files"].append({
            "path": "/etc/selinux/config",
            "mode": 420, "overwrite": True,
            "contents": { "source": "data:text/plain;charset=utf-8;base64," + base64.b64encode("SELINUX=permissive\nSELINUXTYPE=targeted\n".encode()).decode() }
        })
        
        with open(f"{{ install_dir }}/{name}.ign", 'w') as f:
            json.dump(data, f)
        EOF
        
        python3 /tmp/patch_ignition.py okd-bootstrap 192.168.199.20 bootstrap
        python3 /tmp/patch_ignition.py okd-master-01 192.168.199.21 master
        python3 /tmp/patch_ignition.py okd-master-02 192.168.199.22 master
        python3 /tmp/patch_ignition.py okd-master-03 192.168.199.23 master
      changed_when: true

    - name: ✅ VALIDATE - Ensure Patched Ignition is Valid
      ansible.builtin.shell: |
        cat {{ install_dir }}/{{ item }}.ign | docker run --rm -i quay.io/coreos/ignition-validate:release -
      loop: [okd-bootstrap, okd-master-01, okd-master-02, okd-master-03]
      changed_when: false

    - name: 📤 PUBLISH - Move Patched Ignition to Distro Hub
      ansible.builtin.copy:
        src: "{{ install_dir }}/{{ item }}.ign"
        dest: "{{ distribution_root }}/ign/{{ item }}.ign"
        remote_src: true
        mode: "0644"
        owner: 1001
        group: 1001
      loop: [okd-bootstrap, okd-master-01, okd-master-02, okd-master-03, worker]

- name: Phase 4.2 - Provision OKD Master VMs on SMS-1 (Reusable Automation)
  hosts: management_plane
  become: true
  gather_facts: false

  vars:
    vm_root: "/mnt/data/vms"
    base_image: "{{ vm_root }}/scos-base.qcow2"

  tasks:
    - name: 💿 BASE - Download SCOS 9 QCOW2 Image to SMS-1
      ansible.builtin.get_url:
        url: "{{ artifacts.scos_qcow2_url }}"
        dest: "{{ base_image }}.gz"
        mode: "0644"
        force: true

    - name: 📦 EXTRACT - Decompress Base Image
      ansible.builtin.shell: |
        gunzip -c {{ base_image }}.gz > {{ base_image }}
      changed_when: true

    - name: 🏗️ VM - Create Clones and Start OKD Masters
      ansible.builtin.shell: |
        virsh destroy {{ item.name }} || true
        virsh undefine {{ item.name }} --remove-all-storage || true
        qemu-img create -f qcow2 -F qcow2 -b {{ base_image }} {{ vm_root }}/{{ item.name }}.qcow2 {{ item.disk }}G
        curl -o {{ vm_root }}/{{ item.name }}.ign http://192.168.199.5:8080/ign/{{ item.name }}.ign
        virt-install \
          --name {{ item.name }} \
          --ram {{ item.ram }} \
          --vcpus {{ item.cpu }} \
          --os-variant fedora-coreos-stable \
          --disk path={{ vm_root }}/{{ item.name }}.qcow2,bus=virtio \
          --import \
          --network bridge=br0,model=virtio \
          --graphics vnc,listen=0.0.0.0 \
          --noautoconsole \
          --wait 0 \
          --events on_poweroff=restart,on_reboot=restart,on_crash=restart \
          --qemu-commandline="-fw_cfg name=opt/com.coreos/config,file={{ vm_root }}/{{ item.name }}.ign"
      args:
        creates: "/etc/libvirt/qemu/{{ item.name }}.xml"
      loop:
        - { name: "okd-bootstrap", ram: 32768, cpu: 4, disk: 100 }
        - { name: "okd-master-01", ram: 16384, cpu: 4, disk: 100 }
        - { name: "okd-master-02", ram: 16384, cpu: 4, disk: 100 }
        - { name: "okd-master-03", ram: 16384, cpu: 4, disk: 100 }

    - name: ⚡ AUTOSTART - Enable VM Persistence
      ansible.builtin.shell: "virsh autostart {{ item.name }}"
      loop:
        - { name: "okd-bootstrap" }
        - { name: "okd-master-01" }
        - { name: "okd-master-02" }
        - { name: "okd-master-03" }

    - name: 🔓 STATUS - Deployment Complete
      ansible.builtin.debug:
        msg: "OKD 4.19 is deploying with Automated Path Mapping and SELinux Fixes. Reusable state achieved."
