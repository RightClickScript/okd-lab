---
- name: Phase 2.1 - AMD Epyc Sanitization & Networking (Lessons Applied)
  hosts: management_plane
  become: true
  gather_facts: true

  tasks:
    - name: 🛑 SANITIZATION - Remove LXD/LXC
      block:
        - name: Gather service facts
          ansible.builtin.service_facts:

        - name: Stop and disable LXD/LXC services
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: stopped
            enabled: false
          loop: [lxd.service, lxd-agent.service, lxcfs.service]
          when: "ansible_facts.services[item] is defined"
          ignore_errors: true

        - name: Purge LXD/LXC Artifacts
          ansible.builtin.apt:
            name: ["lxd", "lxd-client", "lxc", "lxcfs"]
            state: absent
            purge: true

    - name: 📦 DEPENDENCIES - Install Bridge, Virtualization & Cockpit UI
      ansible.builtin.apt:
        name: 
          - bridge-utils
          - ifupdown
          - python3-libvirt
          - python3-lxml
          - python3-yaml
          - python3-pip
          - cockpit
          - cockpit-machines
        state: present

    - name: 🌐 NETWORKING - Apply Standardized Netplan (br0 over bond0)
      block:
        - name: 🛡️ SAFETY - Deactivate existing netplans (rename to .bak)
          ansible.builtin.shell: |
            for f in /etc/netplan/*.yaml; do
              if [ -f "$f" ]; then
                mv "$f" "${f}.bak"
              fi
            done
          args:
            executable: /bin/bash
          changed_when: true

        - name: Generate Infrastructure Netplan
          ansible.builtin.copy:
            dest: /etc/netplan/99-infra-factory.yaml
            mode: "0644"
            content: |
              network:
                version: 2
                renderer: networkd
                ethernets:
                  {{ physical_iface }}:
                    dhcp4: no
                    optional: true
                bonds:
                  bond0:
                    interfaces: [ "{{ physical_iface }}" ]
                    parameters:
                      mode: active-backup
                      mii-monitor-interval: 100
                bridges:
                  br0:
                    interfaces: [ bond0 ]
                    addresses: [ "{{ ansible_host }}/24" ]
                    routes:
                      - to: default
                        via: {{ network.mgmt_gateway }}
                    nameservers:
                      addresses: [ {{ network.primary_dns }} ]
                      search: {{ network.search_domains }}
                    parameters:
                      stp: false
                    dhcp4: no
                vlans:
                  vlan{{ network.vlan198_id }}:
                    id: {{ network.vlan198_id }}
                    link: br0
                    dhcp4: yes

        - name: Apply netplan
          ansible.builtin.command: netplan apply
          async: 15
          poll: 0

        - name: Wait for host to reconnect on br0
          ansible.builtin.wait_for_connection:
            delay: 5
            timeout: 60

    - name: 🔓 STATUS - Success Message
      ansible.builtin.debug:
        msg: "SMS-1 Networking is standardized. Cockpit available at https://192.168.199.4:9090. Original configs saved as .bak."
