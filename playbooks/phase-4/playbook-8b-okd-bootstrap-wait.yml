---
- name: Phase 4.1b - Wait for OKD Bootstrap & Verify Health
  hosts: lpt-1
  gather_facts: false
  vars:
    install_dir: "/opt/okd-cluster"
  
  tasks:
    - name: ⏳ WAIT - Monitoring OKD Bootstrap Process
      ansible.builtin.command:
        cmd: "openshift-install wait-for bootstrap-complete --dir={{ install_dir }} --log-level=info"
      become: true
      register: bootstrap_result
      async: 3600
      poll: 30

    - name: 🔄 HANDOFF - Comment out Bootstrap node in HAProxy
      ansible.builtin.replace:
        path: /etc/haproxy/haproxy.cfg
        regexp: '^(\s*server okd-bootstrap 192.168.199.20.*)'
        replace: '# \1'
      become: true
      register: lb_handoff

    - name: 🔄 RESTART - Apply Production LB Config
      ansible.builtin.systemd:
        name: haproxy
        state: restarted
      become: true
      when: lb_handoff.changed

    - name: 🗑️ CLEANUP - Destroy Bootstrap VM on SMS-1
      ansible.builtin.shell: |
        virsh destroy okd-bootstrap || true
        virsh undefine okd-bootstrap --remove-all-storage || true
      delegate_to: sms-1
      become: true

    - name: 🔑 CONFIG - Set up Kubeconfig for local spark
      ansible.builtin.file:
        path: "~/.kube"
        state: directory
        mode: '0700'

    - name: 📄 CONFIG - Copy Kubeconfig to User Home
      ansible.builtin.copy:
        src: "{{ install_dir }}/auth/kubeconfig"
        dest: "~/.kube/config"
        mode: '0600'
        remote_src: true
      become: true

    - name: 📝 CSR - Automatically approve pending CSRs
      ansible.builtin.shell: |
        export KUBECONFIG={{ install_dir }}/auth/kubeconfig
        oc get csr -o name | xargs -r oc adm certificate approve
      become: true
      register: csr_approval
      until: "csr_approval is success"
      retries: 10
      delay: 30

    - name: 🚀 VERIFY - Check Master Node Status
      ansible.builtin.command:
        cmd: "oc get nodes"
      environment:
        KUBECONFIG: "{{ install_dir }}/auth/kubeconfig"
      register: node_status
      until: "node_status.stdout.count('Ready') >= 3"
      retries: 20
      delay: 60

    - name: 🔓 STATUS - OKD Control Plane is Ready
      ansible.builtin.debug:
        msg: "Handoff complete. Bootstrap node is commented out and VM deleted. Cluster is healthy."
