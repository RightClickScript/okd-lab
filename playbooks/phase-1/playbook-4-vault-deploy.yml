---
- name: Phase 1-4 - Deploy HashiCorp Vault (via Ingress)
  hosts: lpt-1
  become: true
  gather_facts: false

  tasks:
    - name: 📦 HELM - Add HashiCorp Repo
      kubernetes.core.helm_repository:
        name: hashicorp
        repo_url: "https://helm.releases.hashicorp.com"

    - name: 🚀 DEPLOY - Install Vault via Helm
      kubernetes.core.helm:
        name: vault
        chart_ref: hashicorp/vault
        release_namespace: "{{ vault.namespace }}"
        create_namespace: true
        chart_version: "{{ vault.version }}"
        kubeconfig: "{{ vault.kubeconfig }}"
        values:
          server:
            dataStorage:
              enabled: true
              size: 10Gi
            standalone:
              enabled: true
            ui:
              enabled: true
              serviceType: ClusterIP
        wait: true

    - name: 🌐 INGRESS - Create Vault Ingress Rule
      kubernetes.core.k8s:
        kubeconfig: "{{ vault.kubeconfig }}"
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: vault-ingress
            namespace: "{{ vault.namespace }}"
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: web
          spec:
            rules:
              - host: "{{ vault.hostname }}"
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: vault # FIXED: Corrected from vault-ui to vault
                          port:
                            number: 8200

    - name: 🎉 FINISH - Success Message
      ansible.builtin.debug:
        msg: 
          - "Vault is deployed at http://{{ vault.hostname }}"
          - "Status: SEALED (Manual Init Required)"
          - "To init, run on lpt-1: kubectl exec -n {{ vault.namespace }} -it vault-0 -- vault operator init"
