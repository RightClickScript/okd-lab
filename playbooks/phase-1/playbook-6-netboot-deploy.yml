---
- name: Phase 1.5 - Deploy Netboot.xyz (Host Network Mode)
  hosts: local_spark
  become: true
  gather_facts: false

  vars:
    # We use the main lpt-1 IP for Host Mode to ensure maximum speed
    pxe_ip: "192.168.199.5"
    ui_port: 30010
    http_port: 8081
    config_dir: "/mnt/data/netboot/config"
    assets_dir: "/mnt/data/netboot/assets"

  tasks:
    - name: 📁 PREP - Create Data Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ config_dir }}"
        - "{{ assets_dir }}"

    - name: 🚀 DOCKER - Launch Netboot.xyz (Host Mode)
      community.docker.docker_container:
        name: netbootxyz
        image: ghcr.io/netbootxyz/netbootxyz:latest
        restart_policy: always
        network_mode: host
        # In Host Mode, we use environment variables to change ports
        env:
          PORT: "{{ ui_port }}"
          NGINX_PORT: "{{ http_port }}"
        volumes:
          - "{{ config_dir }}:/config"
          - "{{ assets_dir }}:/assets"
        state: started

    - name: 🛠️ CONFIG - Download Standalone iPXE
      ansible.builtin.get_url:
        url: "https://boot.netboot.xyz/ipxe/netboot.xyz-metal.efi"
        dest: "{{ config_dir }}/netboot.xyz.efi"
        mode: '0644'
        force: true

    - name: 🔓 STATUS - Netboot is Live
      ansible.builtin.debug:
        msg: |
          Netboot.xyz is now active in HOST MODE!
          Web UI: http://{{ pxe_ip }}:{{ ui_port }}
          
          UNIFI SETTINGS (CRITICAL):
          1. Set DHCP Option 66 to: {{ pxe_ip }}
          2. Set DHCP Option 67 to: /netboot.xyz.efi
