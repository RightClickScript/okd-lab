---
- name: Phase 1-1f - Prepare Host Kernel for K8s Networking
  hosts: local_spark
  become: true

  tasks:
    - name: 📝 CONFIG - Create k8s.conf for module loading
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        owner: root
        group: root
        mode: '0644'

    - name: 📝 CONFIG - Create 99-kubernetes-k8s.conf for sysctl
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubernetes-k8s.conf
        content: |
          net.bridge.bridge-nf-call-ip6tables = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.ipv4.ip_forward = 1
          net.ipv4.ip_nonlocal_bind = 1
          net.ipv4.conf.all.arp_ignore = 1
          net.ipv4.conf.all.arp_announce = 2
          net.ipv4.conf.br0.arp_ignore = 1
          net.ipv4.conf.br0.arp_announce = 2
        owner: root
        group: root
        mode: '0644'

    - name: 🔄 APPLY - Load Kernel Modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop: [overlay, br_netfilter]

    - name: 🔄 APPLY - Reload Sysctl
      ansible.builtin.command: sysctl --system
      changed_when: true

    - name: 🎉 FINISH - Success Message
      ansible.builtin.debug:
        msg: "Kernel parameters applied. Please test ping to 192.168.199.50 again."
