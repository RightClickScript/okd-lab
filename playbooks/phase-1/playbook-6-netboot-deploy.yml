---
- name: Phase 1.5 - Deploy Netboot.xyz (Host Network Mode)
  hosts: local_spark
  become: true
  gather_facts: false

  vars:
    pxe_ip: "192.168.199.5"
    ui_port: 30010
    http_port: 8081
    config_dir: "/mnt/data/netboot/config"
    assets_dir: "/mnt/data/netboot/assets"

  tasks:
    - name: 📁 PREP - Create Data Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ config_dir }}"
        - "{{ assets_dir }}"

    - name: 🚀 DOCKER - Launch Netboot.xyz (Host Mode)
      community.docker.docker_container:
        name: netbootxyz
        image: ghcr.io/netbootxyz/netbootxyz:latest
        restart_policy: always
        network_mode: host
        env:
          PORT: "{{ ui_port | string }}"
          NGINX_PORT: "{{ http_port | string }}"
        volumes:
          - "{{ config_dir }}:/config"
          - "{{ assets_dir }}:/assets"
        state: started

    - name: 🛠️ CONFIG - Download Standard iPXE Binaries
      ansible.builtin.get_url:
        url: "https://boot.netboot.xyz/ipxe/{{ item.src }}"
        dest: "{{ config_dir }}/{{ item.dest }}"
        mode: '0644'
        force: true
      loop:
        - { src: "netboot.xyz.efi", dest: "netboot.xyz.efi" }
        - { src: "netboot.xyz.kpxe", dest: "netboot.xyz.kpxe" }

    - name: 🛠️ CONFIG - Enable DHCP Auto-Selection
      ansible.builtin.replace:
        path: "{{ config_dir }}/menus/boot.cfg"
        regexp: 'set dhcp_retry 0'
        replace: 'set dhcp_retry 1'
      ignore_errors: true # In case the file hasn't been created by the container yet

    - name: 🔓 STATUS - Netboot is Live
      ansible.builtin.debug:
        msg: |
          Netboot.xyz is now active in HOST MODE!
          
          RECOMMENDED ACTION:
          If UEFI (.efi) continues to freeze, change UniFi Option 67 to: /netboot.xyz.kpxe
